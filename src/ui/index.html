    // =========================================================================
    // AI Panel
    // =========================================================================
    function AIPanel({ onAcceptAll }) {
      const { state, dispatch } = useAppState();
      const [instructions, setInstructions] = useState('');

      const runSuggest = useCallback(async () => {
        dispatch({ type: 'SET_SUGGEST_RUNNING', running: true });
        dispatch({ type: 'SET_SUGGEST_PROGRESS', message: 'Starting...' });
        try {
          const res = await fetch('/api/suggest-stream', { method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ from: state.from, to: state.to, targetHoursPerDay: state.targetSecondsPerDay / 3600, instructions: instructions.trim() || undefined }) });
          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buffer = '';
          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';
            let eventType = '';
            for (const line of lines) {
              if (line.startsWith('event: ')) { eventType = line.slice(7); continue; }
              if (line.startsWith('data: ')) {
                const data = JSON.parse(line.slice(6));
                if (eventType === 'progress') dispatch({ type: 'SET_SUGGEST_PROGRESS', message: data.message });
                else if (eventType === 'evidence') dispatch({ type: 'SET_EVIDENCE', evidence: data });
                else if (eventType === 'result') dispatch({ type: 'MERGE_SUGGESTIONS', days: data.days });
                else if (eventType === 'error') dispatch({ type: 'ADD_TOAST', message: 'Suggestion failed: ' + data.error, toastType: 'error' });
                eventType = '';
              }
            }
          }
        } catch (err) {
          dispatch({ type: 'ADD_TOAST', message: 'Suggestion failed: ' + err.message, toastType: 'error' });
        }
        dispatch({ type: 'SET_SUGGEST_RUNNING', running: false });
      }, [state.from, state.to, state.targetSecondsPerDay, instructions]);

      return (
        <div className="mb-3 flex-shrink-0 bg-white dark:bg-gray-900 border border-slate-200 dark:border-gray-800 rounded-xl shadow-grid overflow-hidden fade-in">
          <div className="flex items-center justify-between px-5 py-3 border-b border-slate-100 dark:border-gray-800 bg-slate-50/50 dark:bg-gray-900/50">
            <div className="flex items-center gap-2"><SparkleIcon /><span className="text-sm font-semibold text-slate-700 dark:text-slate-300">AI Assistant</span></div>
            <div className="flex items-center gap-2">
              <select id="suggest-scope" className="text-xs font-medium border border-slate-200 dark:border-gray-700 rounded-lg px-2.5 py-1.5 bg-white dark:bg-gray-800 text-slate-600 dark:text-slate-400 focus:ring-2 focus:ring-sky-500 outline-none cursor-pointer">
                <option value="unlogged">Unlogged days</option>
                <option value="all">All days</option>
              </select>
              <button onClick={runSuggest} disabled={state.suggestRunning}
                className="inline-flex items-center gap-1.5 px-4 py-1.5 text-sm font-semibold text-white bg-gradient-to-r from-sky-500 to-indigo-500 hover:from-sky-600 hover:to-indigo-600 rounded-lg shadow-sm transition-all duration-150 disabled:opacity-40 disabled:cursor-not-allowed disabled:shadow-none active:scale-[.97]">
                <ArrowIcon />Suggest
              </button>
              <button onClick={onAcceptAll} className="px-3 py-1.5 text-xs font-medium rounded-lg border border-emerald-300 dark:border-emerald-700 text-emerald-700 dark:text-emerald-400 hover:bg-emerald-50 dark:hover:bg-emerald-950/30 transition">Accept All Suggestions</button>
            </div>
          </div>
          <div className="px-5 py-3">
            <textarea value={instructions} onChange={e => setInstructions(e.target.value)} rows="2"
              placeholder='e.g. "Fill March with my usual pattern. I was on vacation 17-18. Mondays are heavy on INT-2 meetings."'
              className="w-full text-sm border-0 bg-transparent text-slate-800 dark:text-slate-200 placeholder-slate-400 dark:placeholder-slate-600 focus:ring-0 outline-none resize-y leading-relaxed" />
          </div>
          {state.suggestRunning && (
            <div className="px-5 py-2.5 border-t border-slate-100 dark:border-gray-800 bg-sky-50/50 dark:bg-sky-950/20">
              <div className="flex items-center gap-2.5">
                <div className="w-3.5 h-3.5 border-2 border-sky-200 dark:border-sky-800 border-t-sky-500 rounded-full spinner"></div>
                <span className="text-xs font-medium text-sky-700 dark:text-sky-400">{state.suggestProgress}</span>
              </div>
            </div>
          )}
        </div>
      );
    }

    // =========================================================================
    // Settings Panel
    // =========================================================================
    function ScanDirsSection() {
      const { state, dispatch } = useAppState();
      const [newDir, setNewDir] = useState('');
      const [browser, setBrowser] = useState(null); // {current, parent, dirs, loading}

      const refreshDirs = useCallback(async () => {
        try {
          const data = await apiCall('/api/scan-dirs');
          dispatch({ type: 'SET_SCAN_DIRS', scanDirs: data.scanDirs });
        } catch (err) {
          dispatch({ type: 'ADD_TOAST', message: 'Failed to load scan dirs: ' + err.message, toastType: 'error' });
        }
      }, []);

      const toggleDir = useCallback(async (path) => {
        const dir = state.scanDirs.find(d => d.path === path);
        if (!dir) return;
        try {
          const data = await apiCall('/api/scan-dirs', { method: 'PATCH', body: JSON.stringify({ path, enabled: !dir.enabled }) });
          dispatch({ type: 'SET_SCAN_DIRS', scanDirs: data.scanDirs });
        } catch (err) { dispatch({ type: 'ADD_TOAST', message: 'Failed to toggle: ' + err.message, toastType: 'error' }); }
      }, [state.scanDirs]);

      const addDir = useCallback(async (dir) => {
        const path = dir || newDir.trim();
        if (!path) return;
        if (state.scanDirs.some(d => d.path === path)) { setNewDir(''); return; }
        try {
          const data = await apiCall('/api/scan-dirs', { method: 'POST', body: JSON.stringify({ path }) });
          dispatch({ type: 'SET_SCAN_DIRS', scanDirs: data.scanDirs });
          setNewDir('');
        } catch (err) { dispatch({ type: 'ADD_TOAST', message: 'Failed to add: ' + err.message, toastType: 'error' }); }
      }, [newDir, state.scanDirs]);

      const removeDir = useCallback(async (path) => {
        try {
          const data = await apiCall('/api/scan-dirs', { method: 'DELETE', body: JSON.stringify({ path }) });
          dispatch({ type: 'SET_SCAN_DIRS', scanDirs: data.scanDirs });
        } catch (err) { dispatch({ type: 'ADD_TOAST', message: 'Failed to remove: ' + err.message, toastType: 'error' }); }
      }, []);

      const browseTo = useCallback(async (path) => {
        setBrowser(b => ({ ...(b || {}), loading: true }));
        try {
          const params = path ? `?path=${encodeURIComponent(path)}` : '';
          const data = await apiCall(`/api/browse-dirs${params}`);
          setBrowser({ current: data.current, parent: data.parent, dirs: data.dirs, loading: false });
          setNewDir(data.current);
        } catch (err) {
          setBrowser(b => ({ ...(b || {}), loading: false, error: err.message }));
        }
      }, []);

      const openBrowser = useCallback(() => { browseTo(newDir.trim() || undefined); }, [newDir]);
      const closeBrowser = useCallback(() => setBrowser(null), []);

      const selectDir = useCallback(async (path) => {
        await addDir(path);
        if (browser) browseTo(browser.current);
      }, [browser, addDir]);

      const alreadyAdded = new Set(state.scanDirs.map(d => d.path));

      return (
        <div className="px-5 py-3 border-b border-slate-100 dark:border-gray-800">
          <div className="flex items-center justify-between mb-2">
            <span className="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Scan Directories</span>
          </div>
          <div className="text-sm">
            {state.scanDirs.length === 0 ? (
              <p className="text-[11px] text-slate-400 dark:text-slate-600">No directories configured. Add project paths to scan for git repos.</p>
            ) : state.scanDirs.map(dir => (
              <div key={dir.path} className={`flex items-center gap-2.5 py-1.5 group ${dir.enabled ? '' : 'opacity-50'}`}>
                <label className="flex items-center gap-0 cursor-pointer">
                  <input type="checkbox" checked={dir.enabled} onChange={() => toggleDir(dir.path)}
                    className="w-3.5 h-3.5 rounded border-slate-300 dark:border-gray-600 text-indigo-600 focus:ring-indigo-500 cursor-pointer" />
                </label>
                <span className={`flex-1 text-xs font-mono ${dir.enabled ? 'text-slate-700 dark:text-slate-300' : 'text-slate-400 dark:text-slate-600 line-through'}`}>{dir.path}</span>
                <button onClick={() => removeDir(dir.path)} className="opacity-0 group-hover:opacity-100 text-[10px] text-slate-400 hover:text-red-500 transition" title="Remove">{'\u2715'}</button>
              </div>
            ))}
          </div>
          <div className="flex items-center gap-2 mt-2">
            <input value={newDir} onChange={e => setNewDir(e.target.value)} className="flex-1 text-xs border border-slate-200 dark:border-gray-700 rounded-md px-2.5 py-1.5 bg-white dark:bg-gray-800 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="/home/user/Projects" />
            <button onClick={openBrowser} className="text-xs px-2.5 py-1.5 border border-slate-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-slate-600 dark:text-slate-400 rounded-md hover:bg-slate-50 dark:hover:bg-gray-700 transition">Browse</button>
            <button onClick={() => addDir()} className="text-xs px-2.5 py-1.5 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 transition">Add</button>
          </div>
          {browser && (
            <div className="mt-2">
              {browser.loading ? (
                <div className="flex items-center justify-center py-3"><div className="w-4 h-4 border-2 border-slate-200 dark:border-gray-700 border-t-indigo-500 rounded-full spinner"></div></div>
              ) : browser.error ? (
                <p className="text-[11px] text-red-500 py-2">{browser.error}</p>
              ) : (
                <div className="border border-slate-200 dark:border-gray-700 rounded-lg overflow-hidden bg-white dark:bg-gray-800">
                  <div className="flex items-center justify-between px-3 py-2 border-b border-slate-100 dark:border-gray-700 bg-slate-50 dark:bg-gray-800/80">
                    <span className="text-[11px] font-mono text-slate-500 dark:text-slate-400 truncate flex-1" title={browser.current}>{browser.current}</span>
                    <div className="flex items-center gap-1.5 ml-2 flex-shrink-0">
                      {!alreadyAdded.has(browser.current) ? (
                        <button onClick={() => selectDir(browser.current)} className="text-[10px] px-2 py-1 font-semibold bg-indigo-600 text-white rounded hover:bg-indigo-700 transition">Select</button>
                      ) : <span className="text-[10px] text-emerald-600 dark:text-emerald-400 font-medium">Added</span>}
                      <button onClick={closeBrowser} className="text-[10px] text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition">{'\u2715'}</button>
                    </div>
                  </div>
                  <div className="max-h-[200px] overflow-y-auto">
                    {browser.parent !== browser.current && (
                      <div className="flex items-center gap-2 px-3 py-1.5 hover:bg-slate-50 dark:hover:bg-gray-700/50 cursor-pointer transition" onClick={() => browseTo(browser.parent)}>
                        <UndoIcon /><span className="text-xs text-slate-500 dark:text-slate-400">..</span>
                      </div>
                    )}
                    {browser.dirs.length === 0 && <div className="px-3 py-3 text-[11px] text-slate-400 dark:text-slate-600 text-center">No subdirectories</div>}
                    {browser.dirs.map(d => {
                      const fullPath = browser.current === '/' ? '/' + d : browser.current + '/' + d;
                      const added = alreadyAdded.has(fullPath);
                      return (
                        <div key={d} className="flex items-center gap-2 px-3 py-1.5 hover:bg-slate-50 dark:hover:bg-gray-700/50 cursor-pointer transition group" onClick={() => browseTo(fullPath)}>
                          <FolderIcon />
                          <span className="text-xs font-mono text-slate-700 dark:text-slate-300 flex-1">{d}</span>
                          {added ? <span className="text-[9px] text-emerald-500 font-medium">added</span>
                            : <button onClick={e => { e.stopPropagation(); selectDir(fullPath); }} className="opacity-0 group-hover:opacity-100 text-[10px] px-1.5 py-0.5 bg-indigo-100 dark:bg-indigo-900/40 text-indigo-600 dark:text-indigo-400 rounded hover:bg-indigo-200 dark:hover:bg-indigo-800/60 transition" title="Add this directory">+</button>}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    function GoogleSection() {
      const { dispatch } = useAppState();
      const [status, setStatus] = useState(null);

      useEffect(() => {
        (async () => {
          try {
            const data = await apiCall('/api/google/status');
            setStatus(data);
          } catch { setStatus({ error: true }); }
        })();
      }, []);

      const connect = useCallback(async () => {
        try {
          const data = await apiCall('/api/google/connect');
          window.open(data.authUrl, '_blank');
          const poll = setInterval(async () => {
            try {
              const s = await apiCall('/api/google/status');
              if (s.connected) { clearInterval(poll); setStatus(s); }
            } catch {}
          }, 2000);
          setTimeout(() => clearInterval(poll), 120000);
        } catch (err) { dispatch({ type: 'ADD_TOAST', message: 'Google connect failed: ' + err.message, toastType: 'error' }); }
      }, []);

      return (
        <div className="px-5 py-3 border-b border-slate-100 dark:border-gray-800">
          <div className="flex items-center justify-between">
            <span className="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Google Workspace</span>
            <div>
              {status?.connected && <span className="text-[10px] font-medium px-2 py-0.5 rounded-full bg-emerald-100 dark:bg-emerald-900/40 text-emerald-700 dark:text-emerald-400">Connected</span>}
              {status?.configured && !status?.connected && <button onClick={connect} className="text-xs px-2.5 py-1 bg-sky-500 text-white rounded-md hover:bg-sky-600 transition">Connect</button>}
              {status && !status.configured && !status.connected && !status.error && <span className="text-[10px] text-slate-400 dark:text-slate-600">Set googleClientId via CLI first</span>}
              {status?.error && <span className="text-[10px] text-slate-400">unavailable</span>}
              {!status && <span className="text-[10px] text-slate-400">loading...</span>}
            </div>
          </div>
          <p className="text-[11px] text-slate-400 dark:text-slate-600 mt-1">Calendar events and Chat activity are used as evidence for meeting-related worklogs.</p>
        </div>
      );
    }

    function LearnedDescriptions() {
      const { state, dispatch } = useAppState();

      useEffect(() => {
        (async () => {
          try {
            const data = await apiCall('/api/preferences');
            dispatch({ type: 'SET_PREFERENCES', preferences: data.preferences });
          } catch {}
        })();
      }, [state.prefsOpen]);

      const deletePref = useCallback(async (issueKey, description) => {
        try {
          await apiCall('/api/preferences', { method: 'DELETE', body: JSON.stringify({ issueKey, description }) });
          const data = await apiCall('/api/preferences');
          dispatch({ type: 'SET_PREFERENCES', preferences: data.preferences });
        } catch (err) { dispatch({ type: 'ADD_TOAST', message: 'Failed: ' + err.message, toastType: 'error' }); }
      }, []);

      const clearAll = useCallback(async () => {
        if (!confirm('Clear all learned descriptions? The AI will lose memory of your preferred phrasing.')) return;
        try {
          await apiCall('/api/preferences', { method: 'DELETE', body: JSON.stringify({}) });
          dispatch({ type: 'SET_PREFERENCES', preferences: [] });
          dispatch({ type: 'ADD_TOAST', message: 'Cleared all learned descriptions', toastType: 'info' });
        } catch (err) { dispatch({ type: 'ADD_TOAST', message: 'Failed: ' + err.message, toastType: 'error' }); }
      }, []);

      const grouped = {};
      for (const p of state.preferences) {
        if (!grouped[p.issueKey]) grouped[p.issueKey] = [];
        grouped[p.issueKey].push(p);
      }
      const sortedKeys = Object.keys(grouped).sort();

      return (
        <div className="border-b border-slate-100 dark:border-gray-800 last:border-0">
          <div className="flex items-center justify-between px-5 py-3">
            <div className="flex items-center gap-2">
              <span className="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Learned Descriptions</span>
              <span className="text-[10px] font-medium px-1.5 py-0.5 rounded-full bg-slate-200 dark:bg-gray-700 text-slate-500 dark:text-slate-400">{state.preferences.length}</span>
            </div>
            <button onClick={clearAll} className="text-[10px] text-red-500 hover:text-red-700 dark:hover:text-red-400 transition">Clear All</button>
          </div>
          {state.preferences.length === 0 ? (
            <div className="px-5 py-6 text-center text-sm text-slate-400 dark:text-slate-600">No learned descriptions yet. They appear as you create worklogs.</div>
          ) : sortedKeys.map(key => (
            <div key={key} className="border-b border-slate-100 dark:border-gray-800 last:border-0">
              <div className="px-5 py-2 bg-slate-50/50 dark:bg-gray-800/30">
                <span className="text-xs font-semibold text-indigo-600 dark:text-indigo-400">{key}</span>
                {state.issueSummaries[key] && <span className="text-[10px] text-slate-400 dark:text-slate-500 ml-2">{state.issueSummaries[key]}</span>}
              </div>
              {grouped[key].map(p => (
                <div key={p.description} className="flex items-center justify-between px-5 py-1.5 hover:bg-slate-50 dark:hover:bg-gray-800/30 transition-colors group">
                  <div className="flex items-center gap-2">
                    <span className="text-sm text-slate-700 dark:text-slate-300">{p.description}</span>
                    <span className="text-[10px] px-1.5 py-0.5 rounded-full bg-slate-100 dark:bg-gray-700 text-slate-500 dark:text-slate-400">{p.usageCount}x</span>
                  </div>
                  <button onClick={() => deletePref(p.issueKey, p.description)} className="opacity-0 group-hover:opacity-100 text-[10px] text-slate-400 hover:text-red-500 transition" title="Remove">{'\u2715'}</button>
                </div>
              ))}
            </div>
          ))}
        </div>
      );
    }

    function PrefsPanel() {
      const { state, dispatch } = useAppState();
      if (!state.prefsOpen) return null;
      return (
        <div className="mb-3 flex-shrink-0 bg-white dark:bg-gray-900 border border-slate-200 dark:border-gray-800 rounded-xl shadow-grid overflow-hidden fade-in">
          <div className="flex items-center justify-between px-5 py-3 border-b border-slate-100 dark:border-gray-800 bg-slate-50/50 dark:bg-gray-900/50">
            <div className="flex items-center gap-2"><SettingsIcon /><span className="text-sm font-semibold text-slate-700 dark:text-slate-300">Settings</span></div>
            <button onClick={() => dispatch({ type: 'SET_PREFS_OPEN', open: false })} className="text-xs text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 transition">Close</button>
          </div>
          <div className="max-h-[300px] overflow-y-auto">
            <ScanDirsSection />
            <GoogleSection />
            <LearnedDescriptions />
          </div>
        </div>
      );
    }

    // =========================================================================
    // Grid Components
    // =========================================================================
    function EditCell({ issueKey, date, cell, colW }) {
      const { dispatch } = useAppState();
      const durRef = useRef(null);
      const [dur, setDur] = useState(cell ? fmtDur(cell.seconds) : '');
      const [desc, setDesc] = useState(cell?.entries?.[0]?.description ?? '');

      useEffect(() => { if (durRef.current) { durRef.current.focus(); durRef.current.select(); } }, []);

      const save = () => {
        const durVal = dur.trim();
        const descVal = desc.trim();
        if (!durVal) { dispatch({ type: 'CANCEL_EDIT' }); return; }
        let seconds;
        try { seconds = parseDur(durVal); } catch { dispatch({ type: 'ADD_TOAST', message: 'Invalid duration (use: 2h, 30m, 1h30m)', toastType: 'error' }); return; }
        if (!descVal) { dispatch({ type: 'ADD_TOAST', message: 'Description is required', toastType: 'error' }); return; }
        dispatch({ type: 'SAVE_EDIT', issueKey, date, seconds, description: descVal });
      };

      const onKey = (e) => { if (e.key === 'Enter') save(); if (e.key === 'Escape') dispatch({ type: 'CANCEL_EDIT' }); };

      return (
        <td className={`px-1 py-1 ${colW} bg-white dark:bg-gray-900 border-b border-slate-100 dark:border-gray-800/60 ring-2 ring-indigo-500 ring-inset rounded-sm`}>
          <div className="flex flex-col gap-1">
            <input ref={durRef} value={dur} onChange={e => setDur(e.target.value)} onKeyDown={onKey}
              className="text-xs font-medium border border-slate-200 dark:border-gray-700 rounded-md px-2 py-1 text-center bg-white dark:bg-gray-800 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="2h" />
            <input value={desc} onChange={e => setDesc(e.target.value)} onKeyDown={onKey}
              className="text-xs border border-slate-200 dark:border-gray-700 rounded-md px-2 py-1 text-center bg-white dark:bg-gray-800 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Description" />
            <div className="flex gap-1 justify-center">
              <button onClick={save} className="text-[10px] px-2.5 py-0.5 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 font-semibold transition">Save</button>
              <button onClick={() => dispatch({ type: 'CANCEL_EDIT' })} className="text-[10px] px-2 py-0.5 text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 transition">Esc</button>
            </div>
          </div>
        </td>
      );
    }

    const DataCell = memo(function DataCell({ issueKey, date, cell, compact, colW, todayBg, isFocused, rowIdx, colIdx, isLoading, onEdit, onAcceptSuggestion, onRejectSuggestion, onPushDraft, onRemoveDraft, onUndoWorklog, onDeleteWorklog }) {
      if (!cell) {
        return (
          <td className={`px-1 py-2 text-center border-b border-slate-100 dark:border-gray-800/60 ${colW} ${todayBg} ${isFocused ? 'ring-2 ring-indigo-500 ring-inset z-[6]' : ''} cursor-pointer hover:bg-indigo-50 dark:hover:bg-indigo-950/20 transition-colors`}
            data-fc={`${rowIdx}-${colIdx}`} onClick={() => onEdit(issueKey, date)}></td>
        );
      }

      const isSug = cell.source === 'suggestion';
      const isDraft = cell.source === 'draft';
      const bg = isDraft ? 'bg-emerald-50 dark:bg-emerald-950/20 border-l-2 border-l-emerald-400'
                 : isSug ? 'bg-sky-50 dark:bg-sky-950/20 border-l-2 border-l-sky-400' : todayBg;
      const dur = fmtDur(cell.seconds);
      const desc = cell.entries[0]?.description ?? '';
      const tipText = cell.reasoning || desc || '';
      const conf = isSug && cell.confidence ? <span className={`inline-block w-1.5 h-1.5 rounded-full ${cell.confidence === 'high' ? 'bg-emerald-500' : cell.confidence === 'medium' ? 'bg-amber-400' : 'bg-slate-400'} mr-0.5 -translate-y-px`}></span> : null;

      if (isLoading) {
        return (
          <td className={`px-1 py-1.5 text-center border-b border-slate-100 dark:border-gray-800/60 ${colW} ${bg} cursor-pointer relative`}>
            <div className="flex items-center justify-center py-2"><div className="cell-spinner"></div></div>
          </td>
        );
      }

      return (
        <td className={`px-1 py-1.5 text-center border-b border-slate-100 dark:border-gray-800/60 ${colW} ${bg} ${isFocused ? 'ring-2 ring-indigo-500 ring-inset z-[6]' : ''} cursor-pointer hover:bg-indigo-50/60 dark:hover:bg-indigo-950/20 transition-colors relative`}
          data-fc={`${rowIdx}-${colIdx}`} onClick={() => onEdit(issueKey, date)} data-tip={tipText || undefined}>
          {isSug && (
            <div className="flex gap-1 justify-center mt-1">
              <button onClick={e => { e.stopPropagation(); onAcceptSuggestion(issueKey, date); }} className="w-5 h-5 flex items-center justify-center rounded bg-emerald-100 dark:bg-emerald-900/40 text-emerald-700 dark:text-emerald-400 hover:bg-emerald-200 dark:hover:bg-emerald-800/60 transition text-[10px] font-bold" title="Accept as draft">{'\u2713'}</button>
              <button onClick={e => { e.stopPropagation(); onRejectSuggestion(issueKey, date); }} className="w-5 h-5 flex items-center justify-center rounded bg-red-100 dark:bg-red-900/40 text-red-600 dark:text-red-400 hover:bg-red-200 dark:hover:bg-red-800/60 transition text-[10px] font-bold" title="Reject">{'\u2715'}</button>
            </div>
          )}
          {isDraft && (
            <div className="cell-actions absolute top-0.5 right-0.5 flex gap-0.5">
              <button onClick={e => { e.stopPropagation(); onPushDraft(issueKey, date); }} className="w-5 h-5 flex items-center justify-center rounded text-emerald-500 dark:text-emerald-400 hover:bg-emerald-50 dark:hover:bg-emerald-950/40 transition" title="Push to Tempo"><UploadIcon /></button>
              <button onClick={e => { e.stopPropagation(); onRemoveDraft(issueKey, date); }} className="w-5 h-5 flex items-center justify-center rounded text-slate-300 dark:text-slate-600 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-950/40 transition text-[10px]" title="Remove draft">{'\u2715'}</button>
            </div>
          )}
          {!isSug && !isDraft && (
            <div className="cell-actions absolute top-0.5 right-0.5 flex gap-0.5">
              <button onClick={e => { e.stopPropagation(); onUndoWorklog(issueKey, date); }} className="w-5 h-5 flex items-center justify-center rounded text-sky-500 dark:text-sky-400 hover:bg-sky-50 dark:hover:bg-sky-950/40 transition" title="Undo to draft"><UndoIcon /></button>
              <button onClick={e => { e.stopPropagation(); onDeleteWorklog(issueKey, date); }} className="w-5 h-5 flex items-center justify-center rounded text-slate-300 dark:text-slate-600 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-950/40 transition" title="Delete permanently"><TrashIcon /></button>
            </div>
          )}
          <div className="flex flex-col items-center">
            <span className="font-semibold text-[13px] text-slate-800 dark:text-slate-200">{conf}{dur}</span>
            {!compact && <span className="text-[10px] text-slate-400 dark:text-slate-500 max-w-[85px] truncate leading-tight">{desc}</span>}
          </div>
        </td>
      );
    });

    function TimesheetGrid({ grid, dates, issueKeys, actions }) {
      const { state } = useAppState();
      const wdSet = new Set(state.workingDays);
      const target = state.targetSecondsPerDay;
      const isMonth = state.viewMode === 'month';
      const today = todayStr();
      const colW = isMonth ? 'w-[52px] min-w-[52px]' : 'w-[100px] min-w-[100px]';
      const hBase = 'px-2 py-2.5 text-[11px] font-semibold uppercase tracking-wider text-slate-400 dark:text-slate-500 bg-slate-50 dark:bg-gray-900 border-b border-slate-200 dark:border-gray-800 sticky top-0 z-10 select-none';

      return (
        <table className="w-full border-collapse min-w-[700px]">
          <thead>
            <tr>
              <th className={`${hBase} text-left pl-4 sticky left-0 z-20 w-[130px] min-w-[130px] bg-slate-50 dark:bg-gray-900`}>Issue</th>
              {dates.map(d => {
                const wd = wdSet.has(d);
                const isToday = d === today;
                return (
                  <th key={d} className={`${hBase} ${colW} text-center ${!wd ? 'opacity-40' : ''} ${isToday ? 'bg-indigo-50 dark:bg-indigo-950/30' : ''}`}>
                    {isMonth ? (<><div className="leading-tight">{dayLabel(d)}</div><div className={`text-sm font-bold ${isToday ? 'text-indigo-600 dark:text-indigo-400' : 'text-slate-600 dark:text-slate-300'}`}>{shortDate(d)}</div></>) : (
                      <div className={isToday ? 'text-indigo-600 dark:text-indigo-400 font-bold' : ''}>{fullDate(d)}</div>
                    )}
                  </th>
                );
              })}
              <th className={`${hBase} w-[70px] min-w-[70px] text-center bg-slate-100 dark:bg-gray-800/80`}>Total</th>
            </tr>
          </thead>
          <tbody>
            {issueKeys.map((key, rowIdx) => {
              const dm = grid[key] || {};
              let rowTotal = 0;
              return (
                <tr key={key} className="group hover:bg-slate-50/50 dark:hover:bg-gray-800/30 transition-colors">
                  <td className="px-3 py-1.5 text-left border-b border-slate-100 dark:border-gray-800/60 sticky left-0 z-[5] bg-white dark:bg-gray-900 group-hover:bg-slate-50/50 dark:group-hover:bg-gray-800/30 transition-colors cursor-pointer"
                    onClick={() => actions.openIssue(key)} data-tip={state.issueSummaries[key] || 'Click for details'}>
                    <div className="font-semibold text-[12px] text-indigo-600 dark:text-indigo-400 tracking-wide hover:underline">{key}</div>
                    {state.issueSummaries[key] && <div className="text-[10px] text-slate-400 dark:text-slate-500 truncate max-w-[120px] leading-tight">{state.issueSummaries[key]}</div>}
                  </td>
                  {dates.map((d, ci) => {
                    const cell = dm[d];
                    if (cell) rowTotal += cell.seconds;
                    const isToday = d === today;
                    const todayBg = isToday ? 'bg-indigo-50/40 dark:bg-indigo-950/10' : '';
                    const isFocused = state.focusedCell?.row === rowIdx && state.focusedCell?.col === ci;
                    const isEditing = state.editingCell === `${key}:${d}`;
                    const isLoading = state.cellLoading.includes(`${key}:${d}`);

                    if (isEditing) return <EditCell key={d} issueKey={key} date={d} cell={cell} colW={colW} />;

                    return <DataCell key={d} issueKey={key} date={d} cell={cell} compact={isMonth} colW={colW} todayBg={todayBg} isFocused={isFocused} rowIdx={rowIdx} colIdx={ci} isLoading={isLoading}
                      onEdit={actions.startEdit} onAcceptSuggestion={actions.acceptSuggestion} onRejectSuggestion={actions.rejectSuggestion}
                      onPushDraft={actions.pushSingleDraft} onRemoveDraft={actions.removeDraft} onUndoWorklog={actions.undoWorklog} onDeleteWorklog={actions.deleteWorklog} />;
                  })}
                  <td className="px-2 py-2 text-center text-xs font-bold border-b border-slate-100 dark:border-gray-800/60 bg-slate-50/60 dark:bg-gray-800/40 text-slate-700 dark:text-slate-300">{fmtDur(rowTotal)}</td>
                </tr>
              );
            })}
            {/* Totals row */}
            <tr>
              <td className="px-3 py-2.5 text-left text-xs font-bold text-slate-500 dark:text-slate-400 bg-slate-50 dark:bg-gray-800/60 border-t-2 border-slate-200 dark:border-gray-700 sticky left-0 z-[5]">Day Total</td>
              {dates.map(d => {
                let dayTotal = 0, daySuggestions = 0, dayDrafts = 0;
                for (const key of issueKeys) {
                  const c = grid[key]?.[d];
                  if (c) { dayTotal += c.seconds; if (c.source === 'suggestion') daySuggestions++; else if (c.source === 'draft') dayDrafts++; }
                }
                const wd = wdSet.has(d);
                let cls = 'text-slate-300 dark:text-slate-700';
                if (wd) {
                  if (dayTotal >= target) cls = 'text-emerald-600 dark:text-emerald-400';
                  else if (dayTotal > 0) cls = 'text-amber-600 dark:text-amber-400';
                  else cls = 'text-slate-400 dark:text-slate-600';
                }
                const isToday = d === today;
                return (
                  <td key={d} className={`px-1 py-2 text-center text-xs font-bold bg-slate-50 dark:bg-gray-800/60 border-t-2 border-slate-200 dark:border-gray-700 ${cls} ${isToday ? 'bg-indigo-50 dark:bg-indigo-950/20' : ''}`}>
                    {fmtDur(dayTotal) || <span className="text-slate-300 dark:text-slate-700">{'\u2013'}</span>}
                    {(daySuggestions > 0 || dayDrafts > 0) && (
                      <div className="flex items-center justify-center gap-1 mt-1">
                        {daySuggestions > 0 && <button onClick={() => actions.acceptDaySuggestions(d)} className="px-1.5 py-0.5 text-[10px] font-semibold rounded bg-sky-100 dark:bg-sky-900/40 text-sky-700 dark:text-sky-400 hover:bg-sky-200 dark:hover:bg-sky-800/60 transition" title={`Accept ${daySuggestions} suggestion(s) as drafts`}>{'\u2713'} {daySuggestions}</button>}
                        {dayDrafts > 0 && <button onClick={() => actions.submitDayDrafts(d)} className="px-1.5 py-0.5 text-[10px] font-semibold rounded bg-emerald-100 dark:bg-emerald-900/40 text-emerald-700 dark:text-emerald-400 hover:bg-emerald-200 dark:hover:bg-emerald-800/60 transition" title={`Push ${dayDrafts} draft(s) to Tempo`}>{'\u2191'} {dayDrafts}</button>}
                      </div>
                    )}
                  </td>
                );
              })}
              <td className="px-2 py-2.5 text-center text-xs font-extrabold bg-slate-100 dark:bg-gray-800 border-t-2 border-slate-200 dark:border-gray-700 text-slate-700 dark:text-slate-300">
                {fmtDur(dates.reduce((sum, d) => { for (const key of issueKeys) { const c = grid[key]?.[d]; if (c) sum += c.seconds; } return sum; }, 0))}
              </td>
            </tr>
          </tbody>
        </table>
      );
    }

    // =========================================================================
    // Issue Search
    // =========================================================================
    function statusColor(status) {
      if (!status) return 'bg-slate-100 text-slate-600 dark:bg-gray-800 dark:text-slate-400';
      const s = status.toLowerCase();
      if (s === 'done' || s === 'closed' || s === 'resolved') return 'bg-emerald-100 text-emerald-700 dark:bg-emerald-950/40 dark:text-emerald-400';
      if (s === 'in progress' || s === 'in review' || s === 'in development') return 'bg-blue-100 text-blue-700 dark:bg-blue-950/40 dark:text-blue-400';
      return 'bg-slate-100 text-slate-600 dark:bg-gray-800 dark:text-slate-400';
    }

    function IssueSearch({ open, onClose, gridIssueKeys }) {
      const { state, dispatch } = useAppState();
      const [query, setQuery] = useState('');
      const [searchResults, setSearchResults] = useState([]);
      const [searchLoading, setSearchLoading] = useState(false);
      const [initial, setInitial] = useState({ sprint: [], recent: [], loaded: false });
      const [initialLoading, setInitialLoading] = useState(false);
      const debouncedQuery = useDebounce(query, 300);
      const inputRef = useRef(null);
      const cacheRef = useRef({ from: null, to: null, data: null });

      // Focus input when opened
      useEffect(() => { if (open && inputRef.current) inputRef.current.focus(); }, [open]);

      // Reset query when closed
      useEffect(() => { if (!open) { setQuery(''); setSearchResults([]); } }, [open]);

      // Fetch initial issues when opened
      useEffect(() => {
        if (!open) return;
        const cached = cacheRef.current;
        if (cached.data && cached.from === state.from && cached.to === state.to) {
          setInitial({ ...cached.data, loaded: true });
          return;
        }
        setInitialLoading(true);
        (async () => {
          try {
            const data = await apiCall(`/api/issues/initial?from=${state.from}&to=${state.to}`);
            cacheRef.current = { from: state.from, to: state.to, data };
            setInitial({ sprint: data.sprint || [], recent: data.recent || [], loaded: true });
          } catch {
            setInitial({ sprint: [], recent: [], loaded: true });
          } finally {
            setInitialLoading(false);
          }
        })();
      }, [open, state.from, state.to]);

      // Search when query changes
      useEffect(() => {
        if (!debouncedQuery || debouncedQuery.length < 2) { setSearchResults([]); setSearchLoading(false); return; }
        setSearchLoading(true);
        (async () => {
          try {
            const data = await apiCall(`/api/issues?q=${encodeURIComponent(debouncedQuery)}`);
            setSearchResults(data.issues.map(i => ({ ...i, status: '' })));
          } catch {}
          setSearchLoading(false);
        })();
      }, [debouncedQuery]);

      const addIssue = (key) => {
        dispatch({ type: 'ADD_EXTRA_ISSUE', key });
        onClose();
      };

      const existingKeys = new Set(gridIssueKeys || []);
      const isSearching = debouncedQuery.length >= 2;

      const renderItem = (i) => (
        <div key={i.key} className="flex items-center gap-2 px-4 py-2.5 text-sm cursor-pointer hover:bg-indigo-50 dark:hover:bg-indigo-950/30 transition-colors border-b border-slate-100 dark:border-gray-800 last:border-0" onClick={() => addIssue(i.key)}>
          <span className="font-semibold text-indigo-600 dark:text-indigo-400 whitespace-nowrap">{i.key}</span>
          <span className="text-slate-600 dark:text-slate-400 truncate flex-1">{i.summary}</span>
          {i.status && <span className={`text-[10px] font-medium px-1.5 py-0.5 rounded whitespace-nowrap ${statusColor(i.status)}`}>{i.status}</span>}
        </div>
      );

      const renderSection = (label, items) => {
        const filtered = items.filter(i => !existingKeys.has(i.key));
        if (filtered.length === 0) return null;
        return (
          <div>
            <div className="px-4 py-1.5 text-[10px] font-semibold uppercase tracking-wider text-slate-400 dark:text-slate-500 bg-slate-50 dark:bg-gray-950/50 sticky top-0">{label}</div>
            {filtered.map(renderItem)}
          </div>
        );
      };

      if (!open) return null;

      const filteredSearch = isSearching ? searchResults.filter(i => !existingKeys.has(i.key)) : [];
      const hasInitial = initial.sprint.length > 0 || initial.recent.length > 0;
      const showDropdown = isSearching || hasInitial || initialLoading;

      return (
        <div className="flex items-center gap-2 fade-in flex-shrink-0">
          <div className="relative">
            <div className="absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none"><SearchIcon /></div>
            <input ref={inputRef} value={query} onChange={e => setQuery(e.target.value)} onKeyDown={e => e.key === 'Escape' && onClose()}
              className="text-sm border border-slate-200 dark:border-gray-700 rounded-lg pl-9 pr-3 py-2 w-80 bg-white dark:bg-gray-900 focus:ring-2 focus:ring-indigo-500 outline-none shadow-sm" placeholder="Search by key or keyword..." />
            {showDropdown && (
              <div className="absolute top-full left-0 w-full bg-white dark:bg-gray-900 border border-slate-200 dark:border-gray-700 rounded-lg mt-1.5 max-h-72 overflow-y-auto shadow-xl z-50">
                {(initialLoading || searchLoading) && (
                  <div className="px-4 py-3 text-sm text-slate-400 dark:text-slate-500 flex items-center gap-2">
                    <svg className="animate-spin h-4 w-4" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" fill="none"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
                    Loading...
                  </div>
                )}
                {isSearching && !searchLoading && filteredSearch.length > 0 && filteredSearch.map(renderItem)}
                {isSearching && !searchLoading && filteredSearch.length === 0 && (
                  <div className="px-4 py-3 text-sm text-slate-400 dark:text-slate-500">No results found</div>
                )}
                {!isSearching && !initialLoading && (
                  <>
                    {renderSection('Sprint Issues', initial.sprint)}
                    {renderSection('Recently Worked', initial.recent)}
                    {!hasInitial && initial.loaded && (
                      <div className="px-4 py-3 text-sm text-slate-400 dark:text-slate-500">No assigned issues found. Try searching above.</div>
                    )}
                  </>
                )}
              </div>
            )}
          </div>
          <button onClick={onClose} className="text-sm px-3 py-2 text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 transition">Cancel</button>
        </div>
      );
    }

    // =========================================================================
    // Issue Panel (slide-out)
    // =========================================================================
    function IssuePanel() {
      const { dispatch } = useAppState();
      const [panel, setPanel] = useState(null); // {key, loading, issue, transitions}

      // Expose open/close via ref so parent can call it
      const openRef = useRef(null);
      openRef.current = async (key) => {
        setPanel({ key, loading: true, issue: null, transitions: [] });
        try {
          const [issueData, transData] = await Promise.all([apiCall(`/api/issue/${key}`), apiCall(`/api/issue/${key}/transitions`)]);
          setPanel({ key, loading: false, issue: issueData, transitions: transData.transitions });
        } catch (err) {
          setPanel(p => p ? { ...p, loading: false, error: err.message } : null);
        }
      };

      const close = () => setPanel(null);

      const transitionIssue = async (key, transitionId, name) => {
        if (!confirm(`Move ${key} to "${name}"?`)) return;
        try {
          await apiCall(`/api/issue/${key}/transition`, { method: 'POST', body: JSON.stringify({ transitionId }) });
          openRef.current(key);
        } catch (err) { dispatch({ type: 'ADD_TOAST', message: 'Transition failed: ' + err.message, toastType: 'error' }); }
      };

      const postComment = async (key) => {
        const input = document.getElementById('issue-comment-input');
        const text = input?.value?.trim();
        if (!text) return;
        try {
          await apiCall(`/api/issue/${key}/comment`, { method: 'POST', body: JSON.stringify({ text }) });
          openRef.current(key);
        } catch (err) { dispatch({ type: 'ADD_TOAST', message: 'Comment failed: ' + err.message, toastType: 'error' }); }
      };

      // Store openRef in a way the parent can access
      IssuePanel._openRef = openRef;

      const isOpen = panel !== null;
      const defaultStatusCls = 'bg-sky-100 dark:bg-sky-900/40 text-sky-700 dark:text-sky-400';
      const issue = panel?.issue;
      const transitions = panel?.transitions || [];

      const fields = issue ? [
        issue.assignee && ['Assignee', issue.assignee],
        issue.priority && ['Priority', issue.priority],
        issue.sprint && ['Sprint', issue.sprint],
        issue.estimate && ['Estimate', issue.estimate],
        issue.reporter && ['Reporter', issue.reporter],
        issue.created && ['Created', issue.created],
        issue.updated && ['Updated', issue.updated],
      ].filter(Boolean) : [];

      return isOpen ? (
        <div className="fixed inset-0 z-40 flex items-center justify-center" onClick={close}>
          <div className="absolute inset-0 bg-black/20 dark:bg-black/40"></div>
          <div className="relative z-50 w-full max-w-xl max-h-[85vh] bg-white dark:bg-gray-900 rounded-xl border border-slate-200 dark:border-gray-800 shadow-2xl flex flex-col fade-in mx-4" onClick={e => e.stopPropagation()}>
            {panel?.loading && (
              <div className="flex items-center justify-center py-20"><div className="w-6 h-6 border-2 border-slate-200 dark:border-gray-700 border-t-indigo-500 rounded-full spinner"></div></div>
            )}
            {panel?.error && <div className="p-5 text-red-500 text-sm">Failed to load: {panel.error}</div>}
            {issue && (
              <>
                <div className="px-6 py-4 border-b border-slate-100 dark:border-gray-800 flex-shrink-0">
                  <div className="flex items-center justify-between mb-1">
                    <div className="flex items-center gap-2">
                      <span className="text-xs font-semibold text-indigo-600 dark:text-indigo-400 tracking-wide">{issue.key}</span>
                      <span className={`text-[11px] font-semibold px-2 py-0.5 rounded-full ${defaultStatusCls}`}>{issue.status}</span>
                      <span className="text-[11px] text-slate-400 dark:text-slate-500">{issue.type}</span>
                    </div>
                    <button onClick={close} className="w-7 h-7 flex items-center justify-center rounded-md hover:bg-slate-200 dark:hover:bg-gray-700 transition text-slate-400"><XIcon /></button>
                  </div>
                  <h2 className="text-base font-bold text-slate-800 dark:text-slate-200 leading-snug">{issue.summary}</h2>
                  {transitions.length > 0 && (
                    <div className="flex flex-wrap gap-1.5 mt-3">
                      {transitions.map(t => (
                        <button key={t.id} onClick={() => transitionIssue(issue.key, t.id, t.name)}
                          className="text-xs px-2.5 py-1 rounded-md border border-slate-200 dark:border-gray-700 bg-white dark:bg-gray-800 hover:bg-indigo-50 dark:hover:bg-indigo-950/30 hover:border-indigo-300 dark:hover:border-indigo-700 transition font-medium text-slate-600 dark:text-slate-400">{t.name}</button>
                      ))}
                    </div>
                  )}
                </div>
                <div className="flex-1 overflow-y-auto">
                  <div className="grid grid-cols-2 gap-x-4 gap-y-1.5 px-6 py-3 border-b border-slate-100 dark:border-gray-800">
                    {fields.map(([label, value]) => (
                      <div key={label} className="flex items-center justify-between py-0.5">
                        <span className="text-[11px] text-slate-400 dark:text-slate-500">{label}</span>
                        <span className="text-xs font-medium text-slate-700 dark:text-slate-300">{value}</span>
                      </div>
                    ))}
                  </div>
                  <div className="px-6 py-3 border-b border-slate-100 dark:border-gray-800">
                    <div className="text-[10px] font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-2">Description</div>
                    <div className="text-xs text-slate-600 dark:text-slate-400 leading-relaxed space-y-1"
                      dangerouslySetInnerHTML={{ __html: issue.description ? adfToHtml(issue.description) : '<span class="text-slate-400 dark:text-slate-600 italic">No description</span>' }} />
                  </div>
                  {issue.comments?.length > 0 && (
                    <div className="px-6 py-3 border-b border-slate-100 dark:border-gray-800">
                      <div className="text-[10px] font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-2">Recent Comments</div>
                      {issue.comments.map((c, i) => (
                        <div key={i} className="mb-2 last:mb-0">
                          <div className="flex items-center gap-1.5 mb-0.5">
                            <span className="text-[11px] font-semibold text-slate-700 dark:text-slate-300">{c.author}</span>
                            <span className="text-[10px] text-slate-400 dark:text-slate-500">{c.created}</span>
                          </div>
                          <div className="text-xs text-slate-600 dark:text-slate-400" dangerouslySetInnerHTML={{ __html: c.body ? adfToHtml(c.body) : '' }} />
                        </div>
                      ))}
                    </div>
                  )}
                  <div className="px-6 py-3">
                    <div className="text-[10px] font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-2">Add Comment</div>
                    <textarea id="issue-comment-input" rows="2" placeholder="Write a comment..."
                      className="w-full text-xs border border-slate-200 dark:border-gray-700 rounded-md p-2 bg-white dark:bg-gray-800 text-slate-800 dark:text-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none resize-y" />
                    <button onClick={() => postComment(issue.key)} className="mt-1.5 text-xs px-3 py-1.5 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 transition font-semibold">Post</button>
                  </div>
                </div>
              </>
            )}
          </div>
        </div>
      ) : null;
    }

    // =========================================================================
    // Footer
    // =========================================================================
    function Footer({ onShowSearch, onCopyPrevWeek, onSubmitAll, onSubmitWeek, onSubmitMonth, onDiscardAll, onUndoWeek, onUndoMonth, onSubmitDay }) {
      const { state } = useAppState();
      const draftCount = totalDraftCount(state.drafts);
      const deleteCount = state.pendingDeletes.length;
      const hasPending = draftCount > 0 || deleteCount > 0;
      const existingCount = state.worklogs.length;

      const week = getWeekRange(state.from);
      const month = getMonthRange(state.from);
      const weekDraftCount = Object.values(state.drafts).filter(arr => arr.length > 0 && isDateInRange(arr[0].date, week.from, week.to)).reduce((sum, arr) => sum + arr.length, 0);
      const monthDraftCount = Object.values(state.drafts).filter(arr => arr.length > 0 && isDateInRange(arr[0].date, month.from, month.to)).reduce((sum, arr) => sum + arr.length, 0);
      const weekWlCount = state.worklogs.filter(w => isDateInRange(w.startDate, week.from, week.to)).length;
      const monthWlCount = state.worklogs.filter(w => isDateInRange(w.startDate, month.from, month.to)).length;

      const btnCls = 'inline-flex items-center gap-1.5 px-4 py-2 text-sm font-medium rounded-lg border border-slate-200 dark:border-gray-700 bg-white dark:bg-gray-900 hover:bg-slate-50 dark:hover:bg-gray-800 transition shadow-sm';
      const submitBtnCls = 'inline-flex items-center gap-1.5 px-4 py-2 text-sm font-semibold text-white bg-emerald-600 hover:bg-emerald-700 rounded-lg shadow-sm transition active:scale-[.97]';
      const undoBtnCls = 'inline-flex items-center gap-1.5 px-3 py-2 text-xs font-medium rounded-lg border border-sky-200 dark:border-sky-800 text-sky-700 dark:text-sky-400 hover:bg-sky-50 dark:hover:bg-sky-950/30 transition shadow-sm';

      return (
        <div className="flex items-center gap-3 mt-3 flex-shrink-0 flex-wrap">
          <button onClick={onShowSearch} className={btnCls}><PlusIcon /> Add Issue</button>
          <button onClick={onCopyPrevWeek} className={btnCls}><CopyIcon /> Copy Prev Week</button>
          <div className="flex-1"></div>
          {existingCount > 0 && (
            <div className="flex items-center gap-1">
              {weekWlCount > 0 && <button onClick={onUndoWeek} className={undoBtnCls}><UndoIcon /> Unlog Week ({weekWlCount})</button>}
              {monthWlCount > 0 && <button onClick={onUndoMonth} className={undoBtnCls}><UndoIcon /> Unlog Month ({monthWlCount})</button>}
            </div>
          )}
          {hasPending && (
            <>
              <span className="text-xs text-slate-500 dark:text-slate-400 tabular-nums">{draftCount} draft(s){deleteCount ? `, ${deleteCount} del` : ''}</span>
              <button onClick={onDiscardAll} className="px-3 py-2 text-xs font-medium rounded-lg border border-slate-200 dark:border-gray-700 bg-white dark:bg-gray-900 hover:bg-red-50 dark:hover:bg-red-950/30 text-slate-600 dark:text-slate-400 hover:text-red-600 transition shadow-sm">Discard</button>
              <div className="flex items-center gap-1">
                {weekDraftCount > 0 && <button onClick={onSubmitWeek} className={submitBtnCls}><CheckIcon /> Log Week ({weekDraftCount})</button>}
                {monthDraftCount > 0 && monthDraftCount !== weekDraftCount && <button onClick={onSubmitMonth} className={submitBtnCls}><CheckIcon /> Log Month ({monthDraftCount})</button>}
                <button onClick={onSubmitAll} className={submitBtnCls}><CheckIcon /> Log All ({draftCount})</button>
              </div>
            </>
          )}
          {state.evidence && (
            <span className="text-[10px] text-slate-400 dark:text-slate-600" data-tip={`Evidence: ${state.evidence.commits} commits, ${state.evidence.transitions} transitions, ${state.evidence.patterns} patterns`}>
              {state.evidence.commits} commits {'\u00b7'} {state.evidence.transitions} transitions {'\u00b7'} {state.evidence.patterns} patterns
            </span>
          )}
        </div>
      );
    }

    // =========================================================================
    // App
    // =========================================================================
    function App() {
      const [state, dispatch] = useReducer(reducer, initialState);
      const stateRef = useRef(state);
      stateRef.current = state;
      const { isDark, toggleDark } = useDarkMode();
      useTooltip();
      useBeforeUnload(state.drafts, state.pendingDeletes);

      const [searchOpen, setSearchOpen] = useState(false);

      // Data fetching
      const fetchData = useCallback(async (from, to) => {
        const f = from ?? stateRef.current.from;
        const t = to ?? stateRef.current.to;
        dispatch({ type: 'SET_LOADING', loading: true, text: 'Loading worklogs...' });
        try {
          const [wl, wd] = await Promise.all([
            apiCall(`/api/worklogs?from=${f}&to=${t}`),
            apiCall(`/api/working-days?from=${f}&to=${t}`),
          ]);
          dispatch({ type: 'SET_WORKLOGS', worklogs: wl.worklogs });
          dispatch({ type: 'SET_WORKING_DAYS', workingDays: wd.workingDays, targetSecondsPerDay: wd.targetSecondsPerDay });
          const summaries = {};
          for (const w of wl.worklogs) { if (w.issueSummary) summaries[w.issueKey] = w.issueSummary; }
          if (Object.keys(summaries).length > 0) dispatch({ type: 'SET_ISSUE_SUMMARIES_BATCH', summaries });
        } catch (err) { dispatch({ type: 'ADD_TOAST', message: 'Failed to load: ' + err.message, toastType: 'error' }); }
        dispatch({ type: 'SET_LOADING', loading: false });
      }, []);

      useEffect(() => { fetchData(); }, []);

      // Navigation
      const navigate = useCallback((delta) => {
        const s = stateRef.current;
        const f = new Date(`${s.from}T12:00:00`), t = new Date(`${s.to}T12:00:00`);
        if (typeof delta === 'string' && delta.endsWith('m')) {
          const months = parseInt(delta);
          f.setMonth(f.getMonth() + months); f.setDate(1);
          t.setMonth(f.getMonth() + 1); t.setDate(0);
        } else { f.setDate(f.getDate() + delta); t.setDate(t.getDate() + delta); }
        const from = f.toISOString().slice(0, 10), to = t.toISOString().slice(0, 10);
        dispatch({ type: 'SET_DATE_RANGE', from, to });
        fetchData(from, to);
      }, [fetchData]);

      const goToday = useCallback(() => {
        const s = stateRef.current;
        const now = new Date(), dow = now.getDay();
        let from, to;
        if (s.viewMode === 'month') {
          from = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().slice(0, 10);
          to = new Date(now.getFullYear(), now.getMonth() + 1, 0).toISOString().slice(0, 10);
        } else {
          const mon = new Date(now); mon.setDate(now.getDate() - (dow === 0 ? 6 : dow - 1));
          const fri = new Date(mon); fri.setDate(mon.getDate() + 4);
          from = mon.toISOString().slice(0, 10); to = fri.toISOString().slice(0, 10);
        }
        dispatch({ type: 'SET_DATE_RANGE', from, to });
        fetchData(from, to);
      }, [fetchData]);

      const setView = useCallback((mode) => {
        const s = stateRef.current;
        let from, to;
        if (mode === 'month') {
          const d = new Date(`${s.from}T12:00:00`);
          from = new Date(d.getFullYear(), d.getMonth(), 1).toISOString().slice(0, 10);
          to = new Date(d.getFullYear(), d.getMonth() + 1, 0).toISOString().slice(0, 10);
        } else {
          const d = new Date(`${s.from}T12:00:00`), dow = d.getDay();
          const mon = new Date(d); mon.setDate(d.getDate() - (dow === 0 ? 6 : dow - 1));
          const fri = new Date(mon); fri.setDate(mon.getDate() + 4);
          from = mon.toISOString().slice(0, 10); to = fri.toISOString().slice(0, 10);
        }
        dispatch({ type: 'SET_VIEW_MODE', viewMode: mode, from, to });
        fetchData(from, to);
      }, [fetchData]);

      const togglePrefs = useCallback(() => {
        dispatch({ type: 'SET_PREFS_OPEN', open: !stateRef.current.prefsOpen });
      }, []);

      // Grid data
      const gridData = useMemo(() => buildGridData(state), [state.worklogs, state.allSuggestions, state.rejectedSuggestions, state.drafts, state.pendingDeletes, state.extraIssueKeys, state.from, state.to]);

      // Actions
      const startEdit = useCallback((key, date) => {
        if (stateRef.current.loading) return;
        dispatch({ type: 'START_EDIT', cellKey: `${key}:${date}` });
      }, []);

      const acceptSuggestion = useCallback((key, date) => {
        const s = stateRef.current;
        const { grid } = buildGridData(s);
        const cell = grid[key]?.[date];
        if (!cell || cell.source !== 'suggestion') return;
        const drafts = cell.entries.map(e => ({ issueKey: key, date, seconds: parseDur(e.durationHuman), description: e.description, startTime: e.startTime }));
        dispatch({ type: 'SET_DRAFT', key: `${key}:${date}`, entries: drafts });
      }, []);

      const rejectSuggestion = useCallback((key, date) => {
        dispatch({ type: 'REJECT_SUGGESTION', date, issueKey: key });
      }, []);

      const acceptAllSuggestions = useCallback(() => {
        const s = stateRef.current;
        if (s.allSuggestions.length === 0) return;
        const { grid } = buildGridData(s);
        const newDrafts = {};
        for (const key of Object.keys(grid)) {
          for (const date of Object.keys(grid[key])) {
            const cell = grid[key][date];
            if (cell.source === 'suggestion') {
              newDrafts[`${key}:${date}`] = cell.entries.map(e => ({ issueKey: key, date, seconds: parseDur(e.durationHuman), description: e.description, startTime: e.startTime }));
            }
          }
        }
        if (Object.keys(newDrafts).length > 0) dispatch({ type: 'SET_DRAFTS_BATCH', drafts: newDrafts });
      }, []);

      const acceptDaySuggestions = useCallback((date) => {
        const s = stateRef.current;
        const { grid } = buildGridData(s);
        const newDrafts = {};
        for (const key of Object.keys(grid)) {
          const cell = grid[key]?.[date];
          if (cell?.source === 'suggestion') {
            newDrafts[`${key}:${date}`] = cell.entries.map(e => ({ issueKey: key, date, seconds: parseDur(e.durationHuman), description: e.description, startTime: e.startTime }));
          }
        }
        if (Object.keys(newDrafts).length > 0) dispatch({ type: 'SET_DRAFTS_BATCH', drafts: newDrafts });
      }, []);

      const removeDraft = useCallback((key, date) => {
        dispatch({ type: 'REMOVE_DRAFT_AND_DELETES', issueKey: key, date });
      }, []);

      const discardAll = useCallback(() => {
        const s = stateRef.current;
        const count = totalDraftCount(s.drafts);
        if (count === 0 && s.pendingDeletes.length === 0) return;
        if (!confirm(`Discard ${count} draft(s) and ${s.pendingDeletes.length} pending deletion(s)?`)) return;
        dispatch({ type: 'DISCARD_ALL' });
        dispatch({ type: 'ADD_TOAST', message: 'All drafts discarded', toastType: 'info' });
      }, []);

      const pushSingleDraft = useCallback(async (key, date) => {
        const dk = `${key}:${date}`;
        const s = stateRef.current;
        const drafts = s.drafts[dk];
        if (!drafts || drafts.length === 0) return;
        dispatch({ type: 'SET_CELL_LOADING', key: dk });
        try {
          let currentCursor = calcStartTime(s.worklogs, s.drafts, s.pendingDeletes, date);
          for (const draft of drafts) {
            let st = draft.startTime;
            if (!st) { st = cursorToTime(currentCursor); currentCursor += draft.seconds; }
            else if (st.length === 5) st += ':00';
            const result = await apiCall('/api/worklog', { method: 'POST', body: JSON.stringify({ issueKey: key, timeSpentSeconds: draft.seconds, startDate: date, startTime: st, description: draft.description }) });
            dispatch({ type: 'ADD_WORKLOG', worklog: result });
          }
          dispatch({ type: 'REMOVE_DRAFT', key: dk });
          const totalSec = drafts.reduce((sum, d) => sum + d.seconds, 0);
          dispatch({ type: 'ADD_TOAST', message: `Pushed ${fmtDur(totalSec)} to ${key}`, toastType: 'success' });
        } catch (err) { dispatch({ type: 'ADD_TOAST', message: `Push failed: ${err.message}`, toastType: 'error' }); }
        dispatch({ type: 'CLEAR_CELL_LOADING', key: dk });
      }, []);

      const undoWorklog = useCallback(async (key, date) => {
        const s = stateRef.current;
        const wls = s.worklogs.filter(w => w.issueKey === key && w.startDate === date);
        if (wls.length === 0) return;
        const dk = `${key}:${date}`;
        dispatch({ type: 'SET_CELL_LOADING', key: dk });
        try {
          const totalSeconds = wls.reduce((sum, w) => sum + w.timeSpentSeconds, 0);
          for (const wl of wls) { await apiCall(`/api/worklog/${wl.tempoWorklogId}`, { method: 'DELETE' }); }
          dispatch({ type: 'REMOVE_WORKLOGS', ids: wls.map(w => w.tempoWorklogId) });
          dispatch({ type: 'SET_DRAFT', key: dk, entries: wls.map(w => ({ issueKey: key, date: w.startDate, seconds: w.timeSpentSeconds, description: w.description ?? '', startTime: w.startTime })) });
          dispatch({ type: 'ADD_TOAST', message: `Undid ${fmtDur(totalSeconds)} on ${key} \u2014 now a draft`, toastType: 'info' });
        } catch (err) { dispatch({ type: 'ADD_TOAST', message: `Undo failed: ${err.message}`, toastType: 'error' }); }
        dispatch({ type: 'CLEAR_CELL_LOADING', key: dk });
      }, []);

      const deleteWorklog = useCallback(async (key, date) => {
        const s = stateRef.current;
        const wls = s.worklogs.filter(w => w.issueKey === key && w.startDate === date);
        if (wls.length === 0) return;
        const totalSeconds = wls.reduce((sum, w) => sum + w.timeSpentSeconds, 0);
        if (!confirm(`Permanently delete ${fmtDur(totalSeconds)} on ${key} for ${date}? This cannot be undone.`)) return;
        const dk = `${key}:${date}`;
        dispatch({ type: 'SET_CELL_LOADING', key: dk });
        try {
          for (const wl of wls) { await apiCall(`/api/worklog/${wl.tempoWorklogId}`, { method: 'DELETE' }); }
          dispatch({ type: 'REMOVE_WORKLOGS', ids: wls.map(w => w.tempoWorklogId) });
          dispatch({ type: 'REMOVE_PENDING_DELETES', ids: wls.map(w => w.tempoWorklogId) });
          dispatch({ type: 'ADD_TOAST', message: `Deleted ${fmtDur(totalSeconds)} from ${key}`, toastType: 'success' });
        } catch (err) { dispatch({ type: 'ADD_TOAST', message: `Delete failed: ${err.message}`, toastType: 'error' }); }
        dispatch({ type: 'CLEAR_CELL_LOADING', key: dk });
      }, []);

      const submitDrafts = useCallback(async (filterFn, label) => {
        const s = stateRef.current;
        const applicableDrafts = [];
        for (const dk in s.drafts) {
          const arr = s.drafts[dk];
          if (!arr || arr.length === 0) continue;
          if (!filterFn || filterFn(arr[0])) applicableDrafts.push([dk, arr]);
        }
        const applicableDates = new Set(applicableDrafts.map(([, arr]) => arr[0].date));
        const applicableDeletes = filterFn
          ? s.pendingDeletes.filter(id => { const wl = s.worklogs.find(w => w.tempoWorklogId === id); return wl && applicableDates.has(wl.startDate); })
          : [...s.pendingDeletes];

        if (applicableDrafts.length === 0 && applicableDeletes.length === 0) {
          dispatch({ type: 'ADD_TOAST', message: `No drafts to submit for ${label}`, toastType: 'info' }); return;
        }
        const totalDrafts = applicableDrafts.reduce((sum, [, arr]) => sum + arr.length, 0);
        if (!confirm(`Submit ${totalDrafts} draft(s) and ${applicableDeletes.length} deletion(s) for ${label}?`)) return;
        dispatch({ type: 'SET_LOADING', loading: true, text: `Submitting ${totalDrafts} entries...` });
        try {
          const draftsByDate = {};
          for (const [, arr] of applicableDrafts) {
            const date = arr[0].date;
            if (!draftsByDate[date]) draftsByDate[date] = [];
            draftsByDate[date].push(...arr);
          }
          const createEntries = [];
          for (const date in draftsByDate) {
            const kept = s.worklogs.filter(w => w.startDate === date && !s.pendingDeletes.includes(w.tempoWorklogId));
            let cursor = 9 * 3600;
            for (const wl of kept) { const [h,m,sec] = wl.startTime.split(':').map(Number); const end = h*3600+m*60+sec+wl.timeSpentSeconds; if (end > cursor) cursor = end; }
            for (const entry of draftsByDate[date]) {
              let st = entry.startTime;
              if (!st) { st = cursorToTime(cursor); cursor += entry.seconds; }
              else if (st.length === 5) st += ':00';
              createEntries.push({ issueKey: entry.issueKey, timeSpentSeconds: entry.seconds, startDate: entry.date, startTime: st, description: entry.description });
            }
          }
          const result = await apiCall('/api/worklogs/batch', { method: 'POST', body: JSON.stringify({ create: createEntries, delete: applicableDeletes }) });
          dispatch({ type: 'REMOVE_DRAFTS_BATCH', keys: applicableDrafts.map(([dk]) => dk) });
          dispatch({ type: 'REMOVE_PENDING_DELETES', ids: applicableDeletes });
          const hasFailures = result.deleteFailed?.length > 0 || result.createFailed?.length > 0;
          if (hasFailures) dispatch({ type: 'ADD_TOAST', message: `Submitted with issues: ${result.created} created, ${result.createFailed?.length ?? 0} failed`, toastType: 'warning' });
          else dispatch({ type: 'ADD_TOAST', message: `Submitted ${result.created} worklog(s) for ${label}`, toastType: 'success' });
          await fetchData();
        } catch (err) {
          dispatch({ type: 'SET_LOADING', loading: false });
          dispatch({ type: 'ADD_TOAST', message: `Submit failed: ${err.message}`, toastType: 'error' });
          return;
        }
      }, [fetchData]);

      const submitAll = useCallback(() => submitDrafts(null, 'all'), [submitDrafts]);
      const submitWeek = useCallback(() => { const w = getWeekRange(stateRef.current.from); submitDrafts(d => isDateInRange(d.date, w.from, w.to), 'this week'); }, [submitDrafts]);
      const submitMonth = useCallback(() => { const m = getMonthRange(stateRef.current.from); submitDrafts(d => isDateInRange(d.date, m.from, m.to), 'this month'); }, [submitDrafts]);
      const submitDayDrafts = useCallback((date) => submitDrafts(d => d.date === date, date), [submitDrafts]);

      const undoBulk = useCallback(async (worklogs, label) => {
        if (worklogs.length === 0) { dispatch({ type: 'ADD_TOAST', message: `No worklogs to undo for this ${label}`, toastType: 'info' }); return; }
        const totalSeconds = worklogs.reduce((sum, w) => sum + w.timeSpentSeconds, 0);
        if (!confirm(`Undo ${worklogs.length} worklog(s) (${fmtDur(totalSeconds)}) for this ${label}? They will become editable drafts.`)) return;
        dispatch({ type: 'SET_LOADING', loading: true, text: `Undoing 0/${worklogs.length}...` });
        let done = 0;
        const failed = [];
        const newDrafts = {};
        const removedIds = [];
        for (const wl of worklogs) {
          try {
            await apiCall(`/api/worklog/${wl.tempoWorklogId}`, { method: 'DELETE' });
            removedIds.push(wl.tempoWorklogId);
            const dk = `${wl.issueKey}:${wl.startDate}`;
            if (!newDrafts[dk]) newDrafts[dk] = [];
            newDrafts[dk].push({ issueKey: wl.issueKey, date: wl.startDate, seconds: wl.timeSpentSeconds, description: wl.description ?? '', startTime: wl.startTime });
            done++;
            dispatch({ type: 'SET_LOADING', loading: true, text: `Undoing ${done}/${worklogs.length}...` });
          } catch (err) { failed.push({ key: wl.issueKey, error: err.message }); }
        }
        dispatch({ type: 'REMOVE_WORKLOGS', ids: removedIds });
        dispatch({ type: 'SET_DRAFTS_BATCH', drafts: { ...stateRef.current.drafts, ...newDrafts } });
        dispatch({ type: 'SET_LOADING', loading: false });
        if (failed.length > 0) dispatch({ type: 'ADD_TOAST', message: `Undid ${done}/${worklogs.length} worklogs (${failed.length} failed)`, toastType: 'warning' });
        else dispatch({ type: 'ADD_TOAST', message: `Undid ${done} worklog(s) for this ${label} \u2014 now editable drafts`, toastType: 'success' });
      }, []);

      const undoWeek = useCallback(() => { const s = stateRef.current; const w = getWeekRange(s.from); undoBulk(s.worklogs.filter(wl => isDateInRange(wl.startDate, w.from, w.to)), 'week'); }, [undoBulk]);
      const undoMonth = useCallback(() => { const s = stateRef.current; const m = getMonthRange(s.from); undoBulk(s.worklogs.filter(wl => isDateInRange(wl.startDate, m.from, m.to)), 'month'); }, [undoBulk]);

      const copyPrevWeek = useCallback(async () => {
        const s = stateRef.current;
        const wdSet = new Set(s.workingDays);
        const prevFrom = new Date(`${s.from}T12:00:00`); prevFrom.setDate(prevFrom.getDate() - 7);
        const prevTo = new Date(`${s.to}T12:00:00`); prevTo.setDate(prevTo.getDate() - 7);
        dispatch({ type: 'SET_LOADING', loading: true, text: 'Loading previous week...' });
        try {
          const data = await apiCall(`/api/worklogs?from=${prevFrom.toISOString().slice(0, 10)}&to=${prevTo.toISOString().slice(0, 10)}`);
          dispatch({ type: 'SET_LOADING', loading: false });
          let count = 0;
          const newDrafts = { ...stateRef.current.drafts };
          const newSummaries = {};
          for (const wl of data.worklogs) {
            const origDate = new Date(`${wl.startDate}T12:00:00`); origDate.setDate(origDate.getDate() + 7);
            const newDate = origDate.toISOString().slice(0, 10);
            if (!wdSet.has(newDate)) continue;
            const dk = `${wl.issueKey}:${newDate}`;
            if (stateRef.current.worklogs.some(w => w.issueKey === wl.issueKey && w.startDate === newDate)) continue;
            const entry = { issueKey: wl.issueKey, date: newDate, seconds: wl.timeSpentSeconds, description: wl.description, startTime: wl.startTime };
            if (newDrafts[dk]) newDrafts[dk] = [...newDrafts[dk], entry];
            else newDrafts[dk] = [entry];
            if (wl.issueSummary) newSummaries[wl.issueKey] = wl.issueSummary;
            count++;
          }
          dispatch({ type: 'SET_DRAFTS_BATCH', drafts: newDrafts });
          if (Object.keys(newSummaries).length > 0) dispatch({ type: 'SET_ISSUE_SUMMARIES_BATCH', summaries: newSummaries });
          if (count === 0) dispatch({ type: 'ADD_TOAST', message: 'No entries to copy from previous week', toastType: 'info' });
          else dispatch({ type: 'ADD_TOAST', message: `Copied ${count} entries as drafts`, toastType: 'success' });
        } catch (err) {
          dispatch({ type: 'SET_LOADING', loading: false });
          dispatch({ type: 'ADD_TOAST', message: 'Copy failed: ' + err.message, toastType: 'error' });
        }
      }, []);

      const openIssue = useCallback((key) => { IssuePanel._openRef?.current?.(key); }, []);

      // Keyboard shortcuts
      useEffect(() => {
        const handler = (e) => {
          const s = stateRef.current;
          if (s.editingCell) return;
          if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) return;
          const { grid, dates, issueKeys } = buildGridData(s);
          if (issueKeys.length === 0 || dates.length === 0) return;
          const fc = s.focusedCell ?? { row: 0, col: 0 };
          let { row, col } = fc;
          let handled = true;
          switch (e.key) {
            case 'ArrowUp': row = Math.max(0, row - 1); break;
            case 'ArrowDown': row = Math.min(issueKeys.length - 1, row + 1); break;
            case 'ArrowLeft': col = Math.max(0, col - 1); break;
            case 'ArrowRight': col = Math.min(dates.length - 1, col + 1); break;
            case 'Enter': { const k = issueKeys[row], d = dates[col]; if (k && d) startEdit(k, d); break; }
            case 'a': { const k = issueKeys[row], d = dates[col]; const c = grid[k]?.[d]; if (c?.source === 'suggestion') acceptSuggestion(k, d); break; }
            case 'x': { const k = issueKeys[row], d = dates[col]; const c = grid[k]?.[d]; if (c?.source === 'suggestion') rejectSuggestion(k, d); break; }
            case 'd': { const k = issueKeys[row], d = dates[col]; const c = grid[k]?.[d]; if (c?.source === 'existing') dispatch({ type: 'DELETE_ENTRY', issueKey: k, date: d }); else if (c?.source === 'draft') removeDraft(k, d); break; }
            case 'p': { const k = issueKeys[row], d = dates[col]; const c = grid[k]?.[d]; if (c?.source === 'draft') pushSingleDraft(k, d); break; }
            case 'u': { const k = issueKeys[row], d = dates[col]; const c = grid[k]?.[d]; if (c?.source === 'existing') undoWorklog(k, d); break; }
            default: handled = false;
          }
          if (handled) {
            e.preventDefault();
            dispatch({ type: 'SET_FOCUSED_CELL', cell: { row, col } });
            requestAnimationFrame(() => {
              const el = document.querySelector(`[data-fc="${row}-${col}"]`);
              if (el) el.scrollIntoView({ block: 'nearest', inline: 'nearest' });
            });
          }
        };
        document.addEventListener('keydown', handler);
        return () => document.removeEventListener('keydown', handler);
      }, [startEdit, acceptSuggestion, rejectSuggestion, removeDraft, pushSingleDraft, undoWorklog]);

      const actions = useMemo(() => ({
        startEdit, acceptSuggestion, rejectSuggestion, pushSingleDraft, removeDraft,
        undoWorklog, deleteWorklog, openIssue, acceptDaySuggestions, submitDayDrafts,
      }), [startEdit, acceptSuggestion, rejectSuggestion, pushSingleDraft, removeDraft, undoWorklog, deleteWorklog, openIssue, acceptDaySuggestions, submitDayDrafts]);

      return (
        <AppContext.Provider value={{ state, dispatch }}>
          <div className="max-w-[1440px] mx-auto px-5 py-4 h-full flex flex-col">
            <Header isDark={isDark} toggleDark={toggleDark} onNavigate={navigate} onGoToday={goToday} onSetView={setView} onTogglePrefs={togglePrefs} />
            <AIPanel onAcceptAll={acceptAllSuggestions} />
            <PrefsPanel />
            <div className="grid-scroll overflow-auto flex-1 min-h-0 rounded-xl border border-slate-200 dark:border-gray-800 bg-white dark:bg-gray-900 shadow-grid fade-in relative">
              <TimesheetGrid grid={gridData.grid} dates={gridData.dates} issueKeys={gridData.issueKeys} actions={actions} />
              {gridData.issueKeys.length === 0 && (
                <div className="absolute inset-0 top-[42px] flex items-center justify-center pointer-events-none">
                  <div className="flex flex-col items-center gap-2 text-center">
                    <ClockIcon />
                    <p className="text-sm text-slate-400 dark:text-slate-600">No worklogs for this period</p>
                    <p className="text-xs text-slate-400 dark:text-slate-600">Click <b>+ Add Issue</b> or <b>Suggest</b> to get started</p>
                  </div>
                </div>
              )}
            </div>
            <Footer onShowSearch={() => setSearchOpen(true)} onCopyPrevWeek={copyPrevWeek}
              onSubmitAll={submitAll} onSubmitWeek={submitWeek} onSubmitMonth={submitMonth}
              onDiscardAll={discardAll} onUndoWeek={undoWeek} onUndoMonth={undoMonth} onSubmitDay={submitDayDrafts} />
            <div className="flex-shrink-0">
              <IssueSearch open={searchOpen} onClose={() => setSearchOpen(false)} gridIssueKeys={gridData.issueKeys} />
            </div>
          </div>
          <IssuePanel />
          <LoadingOverlay />
          <ToastContainer />
        </AppContext.Provider>
      );
    }

    // Mount
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
