<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tempo Timesheet</title>
  <script>
    // Apply theme before any rendering to prevent flash
    if (localStorage.getItem('darkMode') === 'false' || (!localStorage.getItem('darkMode') && !window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.remove('dark');
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: {
        colors: {
          surface: { light: '#ffffff', dark: '#111827' },
          suggestion: { light: '#eff6ff', dark: '#1e293b' },
        },
        fontFamily: { sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'] },
        boxShadow: { grid: '0 1px 3px 0 rgb(0 0 0 / 0.06), 0 1px 2px -1px rgb(0 0 0 / 0.06)' },
      }}
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse-subtle { 0%, 100% { opacity: 1; } 50% { opacity: .7; } }
    .spinner { animation: spin .7s linear infinite; }
    .fade-in { animation: fadeIn .2s ease-out; }
    .pulse-subtle { animation: pulse-subtle 2s ease-in-out infinite; }
    .grid-scroll::-webkit-scrollbar { height: 6px; }
    .grid-scroll::-webkit-scrollbar-track { background: transparent; }
    .grid-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }
    .dark .grid-scroll::-webkit-scrollbar-thumb { background: #374151; }
    #tooltip { position: fixed; z-index: 9999; pointer-events: none; max-width: 240px; padding: 6px 10px; border-radius: 6px; font-size: 11px; line-height: 1.4; white-space: normal; word-wrap: break-word; background: #1e293b; color: #f8fafc; box-shadow: 0 4px 12px rgb(0 0 0/.18); opacity: 0; transition: opacity .12s; }
    #tooltip.visible { opacity: 1; }
    .dark #tooltip { background: #f1f5f9; color: #0f172a; }
    .cell-actions { opacity: 0; transition: opacity .15s; }
    tr:hover .cell-actions, td:hover .cell-actions { opacity: 1; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }
    .toast-in { animation: slideIn .25s ease-out; }
    .toast-out { animation: slideOut .2s ease-in forwards; }
    .cell-spinner { width: 14px; height: 14px; border: 2px solid #e2e8f0; border-top-color: #6366f1; border-radius: 50%; animation: spin .6s linear infinite; }
    .dark .cell-spinner { border-color: #374151; border-top-color: #818cf8; }
  </style>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
</head>
<body class="bg-slate-50 dark:bg-gray-950 text-slate-800 dark:text-slate-200 h-screen overflow-hidden font-sans antialiased transition-colors duration-200">
  <div id="root"></div>
  <div id="tooltip"></div>
  <div id="toast-container" class="fixed bottom-5 right-5 z-[9999] flex flex-col gap-2 pointer-events-none"></div>

  <script>/*__SERVER_CONFIG__*/</script>
  <script type="text/babel">
    const { useState, useReducer, useContext, useCallback, useMemo, useEffect, useRef, createContext, memo } = React;

    // =========================================================================
    // Pure utilities
    // =========================================================================
    const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

    function parseDur(input) {
      const m = input.trim().toLowerCase().match(/^(?:(\d+(?:\.\d+)?)h)?(?:(\d+(?:\.\d+)?)m)?$/);
      if (m && (m[1] || m[2])) return Math.round((parseFloat(m[1] || "0") * 3600) + (parseFloat(m[2] || "0") * 60));
      throw new Error("Invalid duration");
    }
    function fmtDur(s) {
      if (!s || s <= 0) return "";
      const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
      if (h > 0 && m > 0) return `${h}h${m}m`;
      if (h > 0) return `${h}h`;
      return `${m}m`;
    }
    function dayLabel(d) { return DAYS[new Date(`${d}T12:00:00`).getDay()]; }
    function shortDate(d) { return new Date(`${d}T12:00:00`).getDate(); }
    function fullDate(d) { return `${dayLabel(d)} ${shortDate(d)}`; }
    function rangeLabel(f, t) {
      const df = new Date(`${f}T12:00:00`), dt = new Date(`${t}T12:00:00`);
      if (df.getMonth() === dt.getMonth()) return `${MONTHS[df.getMonth()]} ${df.getDate()} \u2013 ${dt.getDate()}, ${dt.getFullYear()}`;
      return `${MONTHS[df.getMonth()]} ${df.getDate()} \u2013 ${MONTHS[dt.getMonth()]} ${dt.getDate()}, ${dt.getFullYear()}`;
    }
    const todayStr = () => new Date().toISOString().slice(0, 10);

    function getWeekRange(dateStr) {
      const d = new Date(`${dateStr}T12:00:00`);
      const dow = d.getDay();
      const mon = new Date(d); mon.setDate(d.getDate() - (dow === 0 ? 6 : dow - 1));
      const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
      return { from: mon.toISOString().slice(0, 10), to: sun.toISOString().slice(0, 10) };
    }
    function getMonthRange(dateStr) {
      const d = new Date(`${dateStr}T12:00:00`);
      const first = new Date(d.getFullYear(), d.getMonth(), 1);
      const last = new Date(d.getFullYear(), d.getMonth() + 1, 0);
      return { from: first.toISOString().slice(0, 10), to: last.toISOString().slice(0, 10) };
    }
    function isDateInRange(date, from, to) { return date >= from && date <= to; }

    function getAllDates(from, to) {
      const dates = [], cur = new Date(`${from}T12:00:00`), end = new Date(`${to}T12:00:00`);
      while (cur <= end) { dates.push(cur.toISOString().slice(0, 10)); cur.setDate(cur.getDate() + 1); }
      return dates;
    }

    function calcStartTime(worklogs, drafts, pendingDeletes, date) {
      const kept = worklogs.filter(w => w.startDate === date && !pendingDeletes.includes(w.tempoWorklogId));
      let cursor = 9 * 3600;
      for (const wl of kept) {
        const [h, m, s] = wl.startTime.split(':').map(Number);
        const end = h * 3600 + m * 60 + s + wl.timeSpentSeconds;
        if (end > cursor) cursor = end;
      }
      for (const dk in drafts) {
        const arr = drafts[dk];
        if (arr && arr.length > 0 && arr[0].date === date) {
          for (const d of arr) {
            if (d._startCursor) {
              const end = d._startCursor + d.seconds;
              if (end > cursor) cursor = end;
            }
          }
        }
      }
      return cursor;
    }
    function cursorToTime(cursor) {
      const hh = String(Math.floor(cursor / 3600)).padStart(2, '0');
      const mm = String(Math.floor((cursor % 3600) / 60)).padStart(2, '0');
      return `${hh}:${mm}:00`;
    }

    function buildGridData(state) {
      const dates = getAllDates(state.from, state.to);
      const grid = {}; // {issueKey: {date: cell}}

      for (const wl of state.worklogs) {
        if (!grid[wl.issueKey]) grid[wl.issueKey] = {};
        const dm = grid[wl.issueKey];
        const cell = dm[wl.startDate] || { seconds: 0, entries: [], source: "existing" };
        cell.seconds += wl.timeSpentSeconds;
        cell.entries.push(wl);
        dm[wl.startDate] = cell;
      }

      for (const day of state.allSuggestions) {
        for (const entry of day.entries) {
          if (state.rejectedSuggestions.includes(`${day.date}:${entry.issueKey}`)) continue;
          if (!grid[entry.issueKey]) grid[entry.issueKey] = {};
          const dm = grid[entry.issueKey];
          try {
            const parsedSeconds = parseDur(entry.durationHuman);
            const cell = dm[day.date];
            if (cell && cell.source === "suggestion") {
              cell.seconds += parsedSeconds;
              cell.entries.push(entry);
              cell.reasoning = cell.reasoning + " | " + entry.reasoning;
            } else if (!cell) {
              dm[day.date] = { seconds: parsedSeconds, entries: [entry], source: "suggestion", confidence: entry.confidence, reasoning: entry.reasoning };
            }
          } catch {}
        }
      }

      // Overlay drafts
      for (const dk in state.drafts) {
        const draftArr = state.drafts[dk];
        if (!draftArr || draftArr.length === 0) continue;
        const issueKey = draftArr[0].issueKey;
        const date = draftArr[0].date;
        if (!grid[issueKey]) grid[issueKey] = {};
        const totalSeconds = draftArr.reduce((sum, d) => sum + d.seconds, 0);
        grid[issueKey][date] = { seconds: totalSeconds, entries: draftArr, source: "draft" };
      }

      for (const key of state.extraIssueKeys) {
        if (!grid[key]) grid[key] = {};
      }

      const issueKeys = Object.keys(grid).sort();
      return { grid, dates, issueKeys };
    }

    // ADF helpers
    function adfToText(node) {
      if (!node) return '';
      if (node.text) return node.text;
      if (node.content) return node.content.map(adfToText).join('');
      return '';
    }
    function adfToHtml(doc) {
      if (!doc || !doc.content) return '';
      return doc.content.map(block => {
        const text = adfToText(block);
        if (block.type === 'heading') return `<p class="font-semibold mt-2">${escHtml(text)}</p>`;
        if (block.type === 'bulletList' || block.type === 'orderedList') {
          return (block.content || []).map(li => `<p class="ml-3">\u2022 ${escHtml(adfToText(li))}</p>`).join('');
        }
        if (block.type === 'codeBlock') return `<pre class="bg-slate-100 dark:bg-gray-800 rounded p-2 text-xs my-1 overflow-x-auto">${escHtml(text)}</pre>`;
        return text ? `<p>${escHtml(text)}</p>` : '';
      }).join('');
    }
    function escHtml(s) { return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

    async function apiCall(path, opts = {}) {
      const res = await fetch(path, { headers: { "Content-Type": "application/json" }, ...opts });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      return data;
    }

    function totalDraftCount(drafts) {
      return Object.values(drafts).reduce((sum, arr) => sum + arr.length, 0);
    }

    // =========================================================================
    // State management
    // =========================================================================
    let toastIdCounter = 0;

    const initialState = {
      from: window.__CONFIG__?.from ?? new Date().toISOString().slice(0, 10),
      to: window.__CONFIG__?.to ?? new Date().toISOString().slice(0, 10),
      viewMode: 'week',
      targetSecondsPerDay: window.__CONFIG__?.targetSecondsPerDay ?? 28800,
      workingDays: [],
      worklogs: [],
      allSuggestions: [],
      rejectedSuggestions: [],
      extraIssueKeys: [],
      issueSummaries: {},
      drafts: {},
      pendingDeletes: [],
      editingCell: null,
      focusedCell: null,
      cellLoading: [],
      evidence: null,
      suggestRunning: false,
      suggestProgress: '',
      loading: false,
      loadingText: 'Loading...',
      scanDirs: window.__CONFIG__?.scanDirs ?? [],
      prefsOpen: false,
      preferences: [],
      toasts: [],
    };

    function reducer(state, action) {
      switch (action.type) {
        case 'SET_LOADING':
          return { ...state, loading: action.loading, loadingText: action.text ?? state.loadingText };
        case 'SET_WORKLOGS':
          return { ...state, worklogs: action.worklogs };
        case 'SET_WORKING_DAYS':
          return { ...state, workingDays: action.workingDays, targetSecondsPerDay: action.targetSecondsPerDay ?? state.targetSecondsPerDay };
        case 'SET_DATE_RANGE':
          return { ...state, from: action.from, to: action.to, viewMode: action.viewMode ?? state.viewMode };
        case 'SET_VIEW_MODE':
          return { ...state, viewMode: action.viewMode, from: action.from, to: action.to };
        case 'SET_ISSUE_SUMMARY': {
          if (state.issueSummaries[action.key] === action.summary) return state;
          return { ...state, issueSummaries: { ...state.issueSummaries, [action.key]: action.summary } };
        }
        case 'SET_ISSUE_SUMMARIES_BATCH': {
          const newSummaries = { ...state.issueSummaries };
          let changed = false;
          for (const [k, v] of Object.entries(action.summaries)) {
            if (newSummaries[k] !== v) { newSummaries[k] = v; changed = true; }
          }
          return changed ? { ...state, issueSummaries: newSummaries } : state;
        }
        case 'START_EDIT':
          return { ...state, editingCell: action.cellKey };
        case 'CANCEL_EDIT':
          return { ...state, editingCell: null };
        case 'SAVE_EDIT': {
          const { issueKey, date, seconds, description } = action;
          const newPending = [...state.pendingDeletes];
          for (const wl of state.worklogs.filter(w => w.issueKey === issueKey && w.startDate === date)) {
            if (!newPending.includes(wl.tempoWorklogId)) newPending.push(wl.tempoWorklogId);
          }
          return { ...state, editingCell: null, pendingDeletes: newPending,
            drafts: { ...state.drafts, [`${issueKey}:${date}`]: [{ issueKey, date, seconds, description }] } };
        }
        case 'SET_FOCUSED_CELL':
          return { ...state, focusedCell: action.cell };
        case 'SET_DRAFT':
          return { ...state, drafts: { ...state.drafts, [action.key]: action.entries } };
        case 'SET_DRAFTS_BATCH': {
          const newDrafts = { ...state.drafts };
          for (const [k, v] of Object.entries(action.drafts)) newDrafts[k] = v;
          return { ...state, drafts: newDrafts };
        }
        case 'REMOVE_DRAFT': {
          const newDrafts = { ...state.drafts };
          delete newDrafts[action.key];
          return { ...state, drafts: newDrafts };
        }
        case 'DELETE_ENTRY': {
          const { issueKey, date } = action;
          const newPending = [...state.pendingDeletes];
          for (const wl of state.worklogs.filter(w => w.issueKey === issueKey && w.startDate === date)) {
            if (!newPending.includes(wl.tempoWorklogId)) newPending.push(wl.tempoWorklogId);
          }
          const newDrafts = { ...state.drafts };
          delete newDrafts[`${issueKey}:${date}`];
          return { ...state, pendingDeletes: newPending, drafts: newDrafts };
        }
        case 'REMOVE_DRAFT_AND_DELETES': {
          const { issueKey, date } = action;
          const wlIds = state.worklogs.filter(w => w.issueKey === issueKey && w.startDate === date).map(w => w.tempoWorklogId);
          const newDrafts = { ...state.drafts };
          delete newDrafts[`${issueKey}:${date}`];
          return { ...state, drafts: newDrafts, pendingDeletes: state.pendingDeletes.filter(id => !wlIds.includes(id)) };
        }
        case 'DISCARD_ALL':
          return { ...state, drafts: {}, pendingDeletes: [] };
        case 'SET_CELL_LOADING':
          return { ...state, cellLoading: [...state.cellLoading, action.key] };
        case 'CLEAR_CELL_LOADING':
          return { ...state, cellLoading: state.cellLoading.filter(k => k !== action.key) };
        case 'ADD_WORKLOG':
          return { ...state, worklogs: [...state.worklogs, action.worklog] };
        case 'ADD_WORKLOGS':
          return { ...state, worklogs: [...state.worklogs, ...action.worklogs] };
        case 'REMOVE_WORKLOGS':
          return { ...state, worklogs: state.worklogs.filter(w => !action.ids.includes(w.tempoWorklogId)) };
        case 'SET_SUGGEST_RUNNING':
          return { ...state, suggestRunning: action.running };
        case 'SET_SUGGEST_PROGRESS':
          return { ...state, suggestProgress: action.message };
        case 'SET_EVIDENCE':
          return { ...state, evidence: action.evidence };
        case 'MERGE_SUGGESTIONS': {
          const newDates = new Set(action.days.map(d => d.date));
          const allSuggestions = state.allSuggestions.filter(d => !newDates.has(d.date)).concat(action.days);
          const rejectedSuggestions = state.rejectedSuggestions.filter(k => {
            const d = k.split(':')[0];
            return !newDates.has(d);
          });
          return { ...state, allSuggestions, rejectedSuggestions };
        }
        case 'REJECT_SUGGESTION':
          return { ...state, rejectedSuggestions: [...state.rejectedSuggestions, `${action.date}:${action.issueKey}`] };
        case 'ADD_EXTRA_ISSUE':
          return state.extraIssueKeys.includes(action.key) ? state : { ...state, extraIssueKeys: [...state.extraIssueKeys, action.key] };
        case 'SET_SCAN_DIRS':
          return { ...state, scanDirs: action.scanDirs };
        case 'SET_PREFS_OPEN':
          return { ...state, prefsOpen: action.open };
        case 'SET_PREFERENCES':
          return { ...state, preferences: action.preferences };
        case 'ADD_TOAST': {
          const id = ++toastIdCounter;
          return { ...state, toasts: [...state.toasts, { id, message: action.message, type: action.toastType || 'info', exiting: false }] };
        }
        case 'EXIT_TOAST':
          return { ...state, toasts: state.toasts.map(t => t.id === action.id ? { ...t, exiting: true } : t) };
        case 'REMOVE_TOAST':
          return { ...state, toasts: state.toasts.filter(t => t.id !== action.id) };
        case 'REMOVE_DRAFTS_BATCH': {
          const newDrafts = { ...state.drafts };
          for (const k of action.keys) delete newDrafts[k];
          return { ...state, drafts: newDrafts };
        }
        case 'REMOVE_PENDING_DELETES':
          return { ...state, pendingDeletes: state.pendingDeletes.filter(id => !action.ids.includes(id)) };
        default:
          return state;
      }
    }

    const AppContext = createContext(null);
    function useAppState() { return useContext(AppContext); }

    // =========================================================================
    // Custom hooks
    // =========================================================================
    function useDarkMode() {
      const [isDark, setIsDark] = useState(() =>
        localStorage.getItem('darkMode') === 'true' || (!localStorage.getItem('darkMode') && window.matchMedia('(prefers-color-scheme: dark)').matches)
      );
      useEffect(() => {
        document.documentElement.classList.toggle('dark', isDark);
        localStorage.setItem('darkMode', String(isDark));
      }, [isDark]);
      const toggleDark = useCallback(() => setIsDark(d => !d), []);
      return { isDark, toggleDark };
    }

    function useTooltip() {
      useEffect(() => {
        const tooltipEl = document.getElementById('tooltip');
        const onOver = (e) => {
          const target = e.target.closest?.('[data-tip]');
          if (!target) { tooltipEl.classList.remove('visible'); return; }
          const text = target.getAttribute('data-tip');
          if (!text) { tooltipEl.classList.remove('visible'); return; }
          tooltipEl.textContent = text;
          tooltipEl.classList.add('visible');
          const rect = target.getBoundingClientRect();
          const tipRect = tooltipEl.getBoundingClientRect();
          let left = rect.left + rect.width / 2 - tipRect.width / 2;
          let top = rect.top - tipRect.height - 8;
          if (left < 8) left = 8;
          if (left + tipRect.width > window.innerWidth - 8) left = window.innerWidth - tipRect.width - 8;
          if (top < 8) top = rect.bottom + 8;
          tooltipEl.style.left = left + 'px';
          tooltipEl.style.top = top + 'px';
        };
        const onOut = (e) => { if (e.target.closest?.('[data-tip]')) tooltipEl.classList.remove('visible'); };
        document.addEventListener('mouseover', onOver);
        document.addEventListener('mouseout', onOut);
        return () => { document.removeEventListener('mouseover', onOver); document.removeEventListener('mouseout', onOut); };
      }, []);
    }

    function useBeforeUnload(drafts, pendingDeletes) {
      useEffect(() => {
        const handler = (e) => {
          if (totalDraftCount(drafts) > 0 || pendingDeletes.length > 0) {
            e.preventDefault();
            e.returnValue = '';
          }
        };
        window.addEventListener('beforeunload', handler);
        return () => window.removeEventListener('beforeunload', handler);
      }, [drafts, pendingDeletes]);
    }

    function useDebounce(value, delay) {
      const [debounced, setDebounced] = useState(value);
      useEffect(() => {
        const t = setTimeout(() => setDebounced(value), delay);
        return () => clearTimeout(t);
      }, [value, delay]);
      return debounced;
    }

    // =========================================================================
    // SVG Icon helpers
    // =========================================================================
    const ChevronLeft = () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>;
    const ChevronRight = () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>;
    const PlusIcon = () => <svg className="w-3.5 h-3.5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>;
    const CheckIcon = () => <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>;
    const UndoIcon = () => <svg className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M9 15L3 9m0 0l6-6M3 9h12a6 6 0 010 12h-3"/></svg>;

    // =========================================================================
    // Toast Component
    // =========================================================================
    function Toast({ id, message, type, exiting }) {
      const { dispatch } = useAppState();
      useEffect(() => {
        const t = setTimeout(() => dispatch({ type: 'EXIT_TOAST', id }), 3500);
        return () => clearTimeout(t);
      }, [id]);
      useEffect(() => {
        if (exiting) {
          const t = setTimeout(() => dispatch({ type: 'REMOVE_TOAST', id }), 200);
          return () => clearTimeout(t);
        }
      }, [exiting, id]);
      return (
        <div className={`pointer-events-auto px-4 py-2.5 rounded-lg shadow-lg text-sm font-medium ${toastColors[type] || toastColors.info} ${exiting ? 'toast-out' : 'toast-in'} flex items-center gap-2 max-w-sm`}>
          {toastIcons[type]}{message}
        </div>
      );
    }

    function ToastContainer() {
      const { state } = useAppState();
      return ReactDOM.createPortal(
        state.toasts.map(t => <Toast key={t.id} {...t} />),
        document.getElementById('toast-container')
      );
    }
