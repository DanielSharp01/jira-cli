    function hideIssueSearch() { document.getElementById("search-area").innerHTML = ""; }
    function debounceSearch() { clearTimeout(searchTimeout); searchTimeout = setTimeout(doSearch, 300); }
    async function doSearch() {
      const q = document.getElementById("issue-search")?.value?.trim();
      if (!q || q.length < 2) { document.getElementById("search-results")?.classList.add("hidden"); return; }
      try {
        const data = await api(`/api/issues?q=${encodeURIComponent(q)}`);
        const dd = document.getElementById("search-results");
        dd.innerHTML = data.issues.length === 0 ? '<div class="px-4 py-3 text-sm text-slate-400 dark:text-slate-500">No results found</div>'
          : data.issues.map(i => `<div class="px-4 py-2.5 text-sm cursor-pointer hover:bg-indigo-50 dark:hover:bg-indigo-950/30 transition-colors border-b border-slate-100 dark:border-gray-800 last:border-0" onclick="addIssueRow('${esc(i.key)}')"><span class="font-semibold text-indigo-600 dark:text-indigo-400 mr-2">${esc(i.key)}</span><span class="text-slate-600 dark:text-slate-400">${esc(i.summary)}</span></div>`).join("");
        dd.classList.remove("hidden");
      } catch {}
    }
    function addIssueRow(key) { if (!state.extraIssueKeys.includes(key)) state.extraIssueKeys.push(key); hideIssueSearch(); render(); }

    // =========================================================================
    // Copy previous week
    // =========================================================================
    async function copyPrevWeek() {
      const wdSet = new Set(state.workingDays);
      // Determine previous week range
      const prevFrom = new Date(`${state.from}T12:00:00`);
      prevFrom.setDate(prevFrom.getDate() - 7);
      const prevTo = new Date(`${state.to}T12:00:00`);
      prevTo.setDate(prevTo.getDate() - 7);
      const pfStr = prevFrom.toISOString().slice(0, 10);
      const ptStr = prevTo.toISOString().slice(0, 10);

      showLoading("Loading previous week...");
      try {
        const data = await api(`/api/worklogs?from=${pfStr}&to=${ptStr}`);
        hideLoading();
        let count = 0;
        for (const wl of data.worklogs) {
          const origDate = new Date(`${wl.startDate}T12:00:00`);
          origDate.setDate(origDate.getDate() + 7);
          const newDate = origDate.toISOString().slice(0, 10);
          if (!wdSet.has(newDate)) continue; // skip non-working days
          const dk = `${wl.issueKey}:${newDate}`;
          // don't overwrite existing drafts entirely, just append if already exists or skip if we only want to append
          const existing = state.drafts.get(dk);
          // Don't copy if there's already an existing worklog
          if (state.worklogs.some(w => w.issueKey === wl.issueKey && w.startDate === newDate)) continue;
          if (existing) {
             existing.push({ issueKey: wl.issueKey, date: newDate, seconds: wl.timeSpentSeconds, description: wl.description, startTime: wl.startTime });
          } else {
             state.drafts.set(dk, [{ issueKey: wl.issueKey, date: newDate, seconds: wl.timeSpentSeconds, description: wl.description, startTime: wl.startTime }]);
          }
          if (wl.issueSummary) state.issueSummaries.set(wl.issueKey, wl.issueSummary);
          count++;
        }
        if (count === 0) toast("No entries to copy from previous week", 'info');
        else toast(`Copied ${count} entries as drafts`, 'success');
        render();
      } catch (err) { hideLoading(); toast("Copy failed: " + err.message, 'error'); }
    }

    // =========================================================================
    // CSV Export
    // =========================================================================
    function exportCSV() {
      const { grid, dates } = buildGridData();
      const rows = [["Date", "Issue Key", "Duration", "Description", "Source"]];
      for (const d of dates) {
        for (const [key, dm] of grid) {
          const cell = dm.get(d);
          if (!cell) continue;
          const dur = fmtDur(cell.seconds);
          const desc = cell.entries[0]?.description ?? '';
          rows.push([d, key, dur, `"${desc.replace(/"/g, '""')}"`, cell.source]);
        }
      }
      const csv = rows.map(r => r.join(",")).join("\n");
      const blob = new Blob([csv], { type: "text/csv" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = `tempo-${state.from}-to-${state.to}.csv`;
      a.click(); URL.revokeObjectURL(url);
    }

    // =========================================================================
    // Keyboard navigation
    // =========================================================================
    document.addEventListener('keydown', (e) => {
      if (state.editingCell) return; // let edit inputs handle keys
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;

      const { grid, dates } = buildGridData();
      const issueKeys = [...grid.keys()].sort();
      if (issueKeys.length === 0 || dates.length === 0) return;

      const fc = state.focusedCell ?? { row: 0, col: 0 };
      let { row, col } = fc;
      let handled = true;

      switch (e.key) {
        case 'ArrowUp': row = Math.max(0, row - 1); break;
        case 'ArrowDown': row = Math.min(issueKeys.length - 1, row + 1); break;
        case 'ArrowLeft': col = Math.max(0, col - 1); break;
        case 'ArrowRight': col = Math.min(dates.length - 1, col + 1); break;
        case 'Enter': {
          const key = issueKeys[row], date = dates[col];
          if (key && date) startEdit(key, date);
          break;
        }
        case 'a': {
          const key = issueKeys[row], date = dates[col];
          const cell = grid.get(key)?.get(date);
          if (cell?.source === 'suggestion') acceptSuggestion(key, date);
          break;
        }
        case 'x': {
          const key = issueKeys[row], date = dates[col];
          const cell = grid.get(key)?.get(date);
          if (cell?.source === 'suggestion') rejectSuggestion(key, date);
          break;
        }
        case 'd': {
          const key = issueKeys[row], date = dates[col];
          const cell = grid.get(key)?.get(date);
          if (cell?.source === 'existing') deleteEntry(key, date);
          else if (cell?.source === 'draft') removeDraft(key, date);
          break;
        }
        case 'p': {
          const key = issueKeys[row], date = dates[col];
          const cell = grid.get(key)?.get(date);
          if (cell?.source === 'draft') pushSingleDraft(key, date);
          break;
        }
        case 'u': {
          const key = issueKeys[row], date = dates[col];
          const cell = grid.get(key)?.get(date);
          if (cell?.source === 'existing') undoWorklog(key, date);
          break;
        }
        default: handled = false;
      }

      if (handled) {
        e.preventDefault();
        state.focusedCell = { row, col };
        render();
        // Scroll focused cell into view
        const focusedTd = document.querySelector(`[data-fc="${row}-${col}"]`);
        if (focusedTd) focusedTd.scrollIntoView({ block: 'nearest', inline: 'nearest' });
      }
    });

    // =========================================================================
    // Scan directories
    // =========================================================================
    function renderScanDirs() {
      const el = document.getElementById("scan-dirs-list");
      if (!el) return;
      if (state.scanDirs.length === 0) {
        el.innerHTML = '<p class="text-[11px] text-slate-400 dark:text-slate-600">No directories configured. Add project paths to scan for git repos.</p>';
        return;
      }
      el.innerHTML = state.scanDirs.map((dir, i) =>
        `<div class="flex items-center gap-2.5 py-1.5 group ${dir.enabled ? '' : 'opacity-50'}">
          <label class="flex items-center gap-0 cursor-pointer">
            <input type="checkbox" ${dir.enabled ? 'checked' : ''} onchange="toggleScanDir(${i})"
              class="w-3.5 h-3.5 rounded border-slate-300 dark:border-gray-600 text-indigo-600 focus:ring-indigo-500 cursor-pointer">
          </label>
          <span class="flex-1 text-xs font-mono ${dir.enabled ? 'text-slate-700 dark:text-slate-300' : 'text-slate-400 dark:text-slate-600 line-through'}">${esc(dir.path)}</span>
          <button onclick="removeScanDir(${i})" class="opacity-0 group-hover:opacity-100 text-[10px] text-slate-400 hover:text-red-500 transition" title="Remove">\u2715</button>
        </div>`
      ).join("");
    }

    async function saveScanDirs() {
      try { await api("/api/config/scanDirs", { method: "POST", body: JSON.stringify({ scanDirs: state.scanDirs }) }); }
      catch (err) { toast("Failed to save: " + err.message, 'error'); }
    }

    async function toggleScanDir(index) {
      state.scanDirs[index].enabled = !state.scanDirs[index].enabled;
      renderScanDirs();
      await saveScanDirs();
    }

    async function addScanDir() {
      const input = document.getElementById("new-scan-dir");
      const dir = input.value.trim();
      if (!dir) return;
      if (state.scanDirs.some(d => d.path === dir)) { input.value = ""; return; } // prevent duplicates
      state.scanDirs.push({ path: dir, enabled: true });
      input.value = "";
      renderScanDirs();
      await saveScanDirs();
    }

    async function removeScanDir(index) {
      state.scanDirs.splice(index, 1);
      renderScanDirs();
      await saveScanDirs();
    }

    // =========================================================================
    // Google Workspace
    // =========================================================================
    async function loadGoogleStatus() {
      const el = document.getElementById("google-status");
      if (!el) return;
      try {
        const data = await api("/api/google/status");
        if (data.connected) {
          el.innerHTML = '<span class="text-[10px] font-medium px-2 py-0.5 rounded-full bg-emerald-100 dark:bg-emerald-900/40 text-emerald-700 dark:text-emerald-400">Connected</span>';
        } else if (data.configured) {
          el.innerHTML = '<button onclick="connectGoogle()" class="text-xs px-2.5 py-1 bg-sky-500 text-white rounded-md hover:bg-sky-600 transition">Connect</button>';
        } else {
          el.innerHTML = '<span class="text-[10px] text-slate-400 dark:text-slate-600">Set googleClientId via CLI first</span>';
        }
      } catch {
        el.innerHTML = '<span class="text-[10px] text-slate-400">unavailable</span>';
      }
    }

    async function connectGoogle() {
      try {
        const data = await api("/api/google/connect");
        window.open(data.authUrl, "_blank");
        // Poll for connection status
        const poll = setInterval(async () => {
          try {
            const status = await api("/api/google/status");
            if (status.connected) { clearInterval(poll); await loadGoogleStatus(); }
          } catch {}
        }, 2000);
        // Stop polling after 2 minutes
        setTimeout(() => clearInterval(poll), 120000);
      } catch (err) { toast("Google connect failed: " + err.message, 'error'); }
    }

    // =========================================================================
    // =========================================================================
    // Issue detail panel
    // =========================================================================
    async function openIssue(key) {
      const panel = document.getElementById("issue-panel");
      const backdrop = document.getElementById("issue-backdrop");
      const content = document.getElementById("issue-panel-content");

      backdrop.classList.remove("hidden");
      panel.classList.remove("translate-x-full");
      content.innerHTML = `<div class="flex items-center justify-center h-full"><div class="w-6 h-6 border-2 border-slate-200 dark:border-gray-700 border-t-indigo-500 rounded-full spinner"></div></div>`;

      try {
        const [issueData, transData] = await Promise.all([
          api(`/api/issue/${key}`),
          api(`/api/issue/${key}/transitions`),
        ]);
        renderIssuePanel(issueData, transData.transitions);
      } catch (err) {
        content.innerHTML = `<div class="p-5 text-red-500 text-sm">Failed to load: ${esc(err.message)}</div>`;
      }
    }

    function closeIssue() {
      document.getElementById("issue-panel").classList.add("translate-x-full");
      document.getElementById("issue-backdrop").classList.add("hidden");
    }

    function renderIssuePanel(issue, transitions) {
      const content = document.getElementById("issue-panel-content");
      const statusColors = {
        'done': 'bg-emerald-100 dark:bg-emerald-900/40 text-emerald-700 dark:text-emerald-400',
        'indeterminate': 'bg-sky-100 dark:bg-sky-900/40 text-sky-700 dark:text-sky-400',
        'new': 'bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400',
      };
      const defaultStatusCls = 'bg-sky-100 dark:bg-sky-900/40 text-sky-700 dark:text-sky-400';

      // Simple ADF → text
      function adfToText(node) {
        if (!node) return '';
        if (node.text) return node.text;
        if (node.content) return node.content.map(adfToText).join('');
        return '';
      }
      function adfToLines(doc) {
        if (!doc || !doc.content) return '';
        return doc.content.map(block => {
          const text = adfToText(block);
          if (block.type === 'heading') return '<p class="font-semibold mt-2">' + esc(text) + '</p>';
          if (block.type === 'bulletList' || block.type === 'orderedList') {
            return (block.content || []).map(li => '<p class="ml-3">\u2022 ' + esc(adfToText(li)) + '</p>').join('');
          }
          if (block.type === 'codeBlock') return '<pre class="bg-slate-100 dark:bg-gray-800 rounded p-2 text-xs my-1 overflow-x-auto">' + esc(text) + '</pre>';
          return text ? '<p>' + esc(text) + '</p>' : '';
        }).join('');
      }

      const descHtml = issue.description ? adfToLines(issue.description) : '<span class="text-slate-400 dark:text-slate-600 italic">No description</span>';

      const fields = [
        issue.assignee && ['Assignee', issue.assignee],
        issue.priority && ['Priority', issue.priority],
        issue.sprint && ['Sprint', issue.sprint],
        issue.estimate && ['Estimate', issue.estimate],
        issue.reporter && ['Reporter', issue.reporter],
        issue.created && ['Created', issue.created],
        issue.updated && ['Updated', issue.updated],
      ].filter(Boolean);

      content.innerHTML = `
        <!-- Header -->
        <div class="px-5 py-4 border-b border-slate-100 dark:border-gray-800 bg-slate-50/50 dark:bg-gray-900/50">
          <div class="flex items-center justify-between mb-1">
            <span class="text-xs font-semibold text-indigo-600 dark:text-indigo-400 tracking-wide">${esc(issue.key)}</span>
            <button onclick="closeIssue()" class="w-7 h-7 flex items-center justify-center rounded-md hover:bg-slate-200 dark:hover:bg-gray-700 transition text-slate-400">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
          </div>
          <h2 class="text-base font-bold text-slate-800 dark:text-slate-200 leading-snug">${esc(issue.summary)}</h2>
          <div class="flex items-center gap-2 mt-2">
            <span class="text-[11px] font-semibold px-2 py-0.5 rounded-full ${defaultStatusCls}">${esc(issue.status)}</span>
            <span class="text-[11px] text-slate-400 dark:text-slate-500">${esc(issue.type)}</span>
          </div>
        </div>

        <!-- Transitions -->
        ${transitions.length > 0 ? `
        <div class="px-5 py-3 border-b border-slate-100 dark:border-gray-800">
          <div class="text-[10px] font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-2">Move to</div>
          <div class="flex flex-wrap gap-1.5">
            ${transitions.map(t => `
              <button onclick="transitionIssue('${esc(issue.key)}','${esc(t.id)}','${esc(t.name)}')"
                class="text-xs px-2.5 py-1 rounded-md border border-slate-200 dark:border-gray-700 bg-white dark:bg-gray-800 hover:bg-indigo-50 dark:hover:bg-indigo-950/30 hover:border-indigo-300 dark:hover:border-indigo-700 transition font-medium text-slate-600 dark:text-slate-400">
                ${esc(t.name)}
              </button>
            `).join('')}
          </div>
        </div>
        ` : ''}

        <!-- Fields -->
        <div class="px-5 py-3 border-b border-slate-100 dark:border-gray-800">
          ${fields.map(([label, value]) => `
            <div class="flex items-center justify-between py-1">
              <span class="text-[11px] text-slate-400 dark:text-slate-500">${label}</span>
              <span class="text-xs font-medium text-slate-700 dark:text-slate-300">${esc(value)}</span>
            </div>
          `).join('')}
        </div>

        <!-- Description -->
        <div class="px-5 py-3 border-b border-slate-100 dark:border-gray-800">
          <div class="text-[10px] font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-2">Description</div>
          <div class="text-xs text-slate-600 dark:text-slate-400 leading-relaxed space-y-1">${descHtml}</div>
        </div>

        <!-- Comments -->
        ${issue.comments.length > 0 ? `
        <div class="px-5 py-3 border-b border-slate-100 dark:border-gray-800">
          <div class="text-[10px] font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-2">Recent Comments</div>
          ${issue.comments.map(c => `
            <div class="mb-2 last:mb-0">
              <div class="flex items-center gap-1.5 mb-0.5">
                <span class="text-[11px] font-semibold text-slate-700 dark:text-slate-300">${esc(c.author)}</span>
                <span class="text-[10px] text-slate-400 dark:text-slate-500">${esc(c.created)}</span>
              </div>
              <div class="text-xs text-slate-600 dark:text-slate-400">${c.body ? adfToLines(c.body) : ''}</div>
            </div>
          `).join('')}
        </div>
        ` : ''}

        <!-- Quick comment -->
        <div class="px-5 py-3">
          <div class="text-[10px] font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-2">Add Comment</div>
          <textarea id="issue-comment-input" rows="2" placeholder="Write a comment..."
            class="w-full text-xs border border-slate-200 dark:border-gray-700 rounded-md p-2 bg-white dark:bg-gray-800 text-slate-800 dark:text-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none resize-y"></textarea>
          <button onclick="postComment('${esc(issue.key)}')" class="mt-1.5 text-xs px-3 py-1.5 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 transition font-semibold">Post</button>
        </div>
      `;
    }

    async function transitionIssue(key, transitionId, name) {
      if (!confirm('Move ' + key + ' to "' + name + '"?')) return;
      try {
        await api('/api/issue/' + key + '/transition', { method: 'POST', body: JSON.stringify({ transitionId }) });
        await openIssue(key); // re-fetch to update status + transitions
      } catch (err) { toast('Transition failed: ' + err.message, 'error'); }
    }

    async function postComment(key) {
      const input = document.getElementById('issue-comment-input');
      const text = input.value.trim();
      if (!text) return;
      try {
        await api('/api/issue/' + key + '/comment', { method: 'POST', body: JSON.stringify({ text }) });
        input.value = '';
        await openIssue(key); // re-fetch to show new comment
      } catch (err) { toast('Comment failed: ' + err.message, 'error'); }
    }

    // Preferences panel
    // =========================================================================
    async function togglePrefs() {
      const panel = document.getElementById("prefs-panel");
      if (panel.classList.contains("hidden")) {
        panel.classList.remove("hidden");
        await loadPrefs();
      } else {
        panel.classList.add("hidden");
      }
    }

    async function loadPrefs() {
      renderScanDirs();
      await loadGoogleStatus();
      try {
        const data = await api("/api/preferences");
        const prefs = data.preferences;
        const countEl = document.getElementById("prefs-count");
        countEl.textContent = String(prefs.length);

        const list = document.getElementById("prefs-list");
        if (prefs.length === 0) {
          list.innerHTML = '<div class="px-5 py-6 text-center text-sm text-slate-400 dark:text-slate-600">No learned descriptions yet. They appear as you create worklogs.</div>';
          return;
        }

        // Group by issue key
        const grouped = new Map();
        for (const p of prefs) {
          const arr = grouped.get(p.issueKey) ?? [];
          arr.push(p);
          grouped.set(p.issueKey, arr);
        }

        let html = '';
        for (const [key, items] of [...grouped].sort(([a], [b]) => a.localeCompare(b))) {
          html += `<div class="border-b border-slate-100 dark:border-gray-800 last:border-0">
            <div class="px-5 py-2 bg-slate-50/50 dark:bg-gray-800/30">
              <span class="text-xs font-semibold text-indigo-600 dark:text-indigo-400">${esc(key)}</span>
              ${state.issueSummaries.get(key) ? `<span class="text-[10px] text-slate-400 dark:text-slate-500 ml-2">${esc(state.issueSummaries.get(key))}</span>` : ''}
            </div>`;
          for (const p of items) {
            html += `<div class="flex items-center justify-between px-5 py-1.5 hover:bg-slate-50 dark:hover:bg-gray-800/30 transition-colors group">
              <div class="flex items-center gap-2">
                <span class="text-sm text-slate-700 dark:text-slate-300">${esc(p.description)}</span>
                <span class="text-[10px] px-1.5 py-0.5 rounded-full bg-slate-100 dark:bg-gray-700 text-slate-500 dark:text-slate-400">${p.usageCount}x</span>
              </div>
              <button onclick="deletePref('${esc(p.issueKey)}','${esc(p.description)}')" class="opacity-0 group-hover:opacity-100 text-[10px] text-slate-400 hover:text-red-500 transition" title="Remove">\u2715</button>
            </div>`;
          }
          html += '</div>';
        }
        list.innerHTML = html;
      } catch (err) {
        document.getElementById("prefs-list").innerHTML = `<div class="px-5 py-4 text-sm text-red-500">Failed to load: ${esc(err.message)}</div>`;
      }
    }

    async function deletePref(issueKey, description) {
      try {
        await api("/api/preferences", { method: "DELETE", body: JSON.stringify({ issueKey, description }) });
        await loadPrefs();
      } catch (err) { toast("Failed: " + err.message, 'error'); }
    }

    async function clearPrefs() {
      if (!confirm("Clear all learned descriptions? The AI will lose memory of your preferred phrasing.")) return;
      try {
        await api("/api/preferences", { method: "DELETE", body: JSON.stringify({}) });
        await loadPrefs();
        toast('Cleared all learned descriptions', 'info');
      } catch (err) { toast("Failed: " + err.message, 'error'); }
    }

    // =========================================================================
    // Init
    // =========================================================================
    fetchData();
  </script>
</body>
